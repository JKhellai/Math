<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>数学知识体系 · 3D 知识图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<style>
  :root{
    --bg0:#05070f; --ink:#e8eefc; --muted:#8ea1c4;
    --gold:#fbbf24; --cyan:#22d3ee; --glass:rgba(11,17,32,.74);
    --line:rgba(125,160,220,.16); --line2:rgba(125,160,220,.28);
    --neutral:#A9A9A9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;overflow:hidden;background:var(--bg0)}
  body{
    font-family:"Noto Sans SC",system-ui,sans-serif;color:var(--ink);
    background:
      radial-gradient(1200px 800px at 70% 18%, #101a36 0%, rgba(16,26,54,0) 60%),
      radial-gradient(900px 700px at 18% 88%, #0d1530 0%, rgba(13,21,48,0) 55%),
      linear-gradient(180deg,#05070f 0%, #080d1c 100%);
  }

  /* ── 顶栏 ─────────────────────────────────────────────── */
  #topbar{
    position:fixed;top:0;left:0;right:0;height:52px;z-index:20;display:flex;align-items:center;gap:10px;
    padding:0 14px;background:linear-gradient(180deg,rgba(7,11,22,.92),rgba(7,11,22,.55));
    border-bottom:1px solid var(--line);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  }
  .navbtn{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);
    background:rgba(255,255,255,.04);color:#cdd9f2;cursor:pointer;font-size:16px;line-height:1;
    display:grid;place-items:center;transition:.15s;flex:none}
  .navbtn:hover:not(:disabled){color:#fff;border-color:var(--line2);background:rgba(255,255,255,.09)}
  .navbtn:disabled{opacity:.32;cursor:default}
  #crumbs{display:flex;align-items:center;gap:2px;flex:1;min-width:0;overflow:hidden;
    white-space:nowrap;font-size:13px}
  #crumbs .seg{color:#bcccf0;cursor:pointer;padding:3px 7px;border-radius:6px;transition:.15s;flex:none}
  #crumbs .seg:hover{background:rgba(255,255,255,.08);color:#fff}
  #crumbs .seg.cur{color:#fff;font-weight:600}
  #crumbs .sp{color:var(--muted);opacity:.6;flex:none;padding:0 1px}
  #searchWrap{position:relative;flex:none}
  #search{width:200px;height:32px;border-radius:9px;border:1px solid var(--line);
    background:rgba(255,255,255,.04);color:var(--ink);padding:0 12px;font-size:13px;font-family:inherit;outline:none;transition:.15s}
  #search:focus{border-color:var(--line2);background:rgba(255,255,255,.07);width:240px}
  #search::placeholder{color:var(--muted)}
  #results{position:absolute;top:38px;right:0;width:280px;max-height:50vh;overflow-y:auto;z-index:30;
    background:var(--glass);border:1px solid var(--line);border-radius:11px;backdrop-filter:blur(14px);
    box-shadow:0 16px 50px rgba(0,0,0,.5);padding:6px;display:none}
  #results.open{display:block}
  #results .r{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:8px;cursor:pointer;font-size:13px;color:#cdd9f2}
  #results .r:hover{background:rgba(255,255,255,.08);color:#fff}
  #results .r .cd{width:8px;height:8px;border-radius:50%;flex:none}
  #results .r .sub{color:var(--muted);font-size:11px;margin-left:auto}
  #results .empty{padding:12px;color:var(--muted);font-size:12.5px;text-align:center}

  /* ── 主区：图（全幅底层）+ 面板（覆盖层滑入，不挤压图区）──────────── */
  #app{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:hidden}
  #graph{position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;z-index:1;
    transition:top .42s cubic-bezier(.22,.9,.3,1),left .42s cubic-bezier(.22,.9,.3,1),width .42s cubic-bezier(.22,.9,.3,1),height .42s cubic-bezier(.22,.9,.3,1),transform .42s cubic-bezier(.22,.9,.3,1),opacity .3s}
  #scene{position:absolute;inset:0;display:block;touch-action:none;cursor:grab}
  #scene.grabbing{cursor:grabbing}
  #labels{position:absolute;inset:0;pointer-events:none;overflow:hidden}
  /* 面板覆盖在图之上滑入：图保持原尺寸、镜头不被顶走 */
  #panel{position:absolute;top:0;right:0;bottom:0;width:var(--pw,400px);max-width:92%;
    transform:translateX(100%);
    transition:transform .42s cubic-bezier(.22,.9,.3,1), width .42s cubic-bezier(.22,.9,.3,1);
    background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border-left:1px solid var(--line);box-shadow:-24px 0 64px rgba(0,0,0,.5);
    display:flex;flex-direction:column;z-index:8}
  body.panelopen #panel{transform:translateX(0)}
  body.dragging #panel{transition:none}      /* 拖拽分隔条时关掉过渡，避免迟滞 */
  /* 分隔条 = 面板左缘的拖拽把手，随面板一起滑入 */
  #splitter{position:absolute;top:0;left:0;bottom:0;width:12px;transform:translateX(-50%);
    cursor:col-resize;z-index:9;display:none}
  #splitter::after{content:"";position:absolute;top:0;bottom:0;left:5px;width:2px;background:var(--line);transition:.15s}
  #splitter:hover::after{background:var(--line2)}
  body.panelopen #splitter{display:block}
  /* 专注阅读：面板近全宽，图平滑缩成左下角小地图（数值 top/left/宽高 → 可过渡）*/
  body.reading #panel{width:100%;max-width:100%}
  body.reading #graph{top:calc(100% - 214px);left:14px;width:300px;height:200px;z-index:20;
    border:1px solid var(--line2);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.5);
    background:radial-gradient(150px 110px at 60% 32%, #111c38 0%, #070b16 80%)}  /* 不透明底，内容看得清 */
  body.reading #splitter{display:none}
  /* 小地图收起：向下滑出，只留一个"地图"按钮 */
  body.reading.mapmin #graph{transform:translateY(calc(100% + 28px));opacity:0;pointer-events:none}
  #mapToggle{position:absolute;left:14px;bottom:14px;z-index:22;display:none;align-items:center;gap:5px;
    padding:6px 11px;border-radius:9px;font-size:11.5px;color:#cdd9f2;background:var(--glass);
    border:1px solid var(--line2);backdrop-filter:blur(10px);cursor:pointer;transition:.15s}
  #mapToggle:hover{color:#fff}
  body.reading #mapToggle{display:inline-flex}

  /* ── 触屏底部预览卡：单击节点先看简介，地图保持可见可操作 ── */
  #peek{position:absolute;left:14px;right:14px;bottom:14px;z-index:7;
    background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--line2);border-radius:14px;padding:12px 14px;
    box-shadow:0 14px 44px rgba(0,0,0,.55);
    transform:translateY(calc(100% + 28px));transition:transform .3s cubic-bezier(.22,.9,.3,1)}
  #peek.show{transform:translateY(0)}
  #peek .ph{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  #peek .pd{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor}
  #peek .pt{font-weight:700;font-size:15px;color:#fff;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #peek .px{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);
    background:rgba(255,255,255,.04);color:var(--muted);font-size:14px;line-height:1;flex:none}
  #peek .ps{font-size:12.5px;line-height:1.6;color:#c2d0ee}
  #peek .pb{display:flex;gap:8px;margin-top:10px}
  #peek .pb button{flex:1;padding:9px 0;border-radius:9px;border:1px solid var(--line2);
    background:rgba(255,255,255,.06);color:#e8eefc;font-size:13px;font-family:inherit}
  #peek .pb button:active{background:rgba(255,255,255,.14)}

  #phead{padding:18px 22px 12px;border-bottom:1px solid var(--line);flex:none;position:relative}
  #pbadge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.6px;
    padding:3px 9px;border-radius:20px;text-transform:uppercase;margin-bottom:10px;border:1px solid var(--line)}
  #ptitle{font-family:"Cormorant Garamond",serif;font-weight:700;font-size:26px;line-height:1.12;color:#fff;padding-right:64px}
  #pctrls{position:absolute;top:16px;right:16px;display:flex;gap:6px}
  #pctrls button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);
    background:rgba(255,255,255,.04);color:var(--muted);cursor:pointer;font-size:15px;line-height:1;transition:.15s;display:grid;place-items:center}
  #pctrls button:hover{color:#fff;background:rgba(255,255,255,.1)}
  #pbody{padding:18px 22px 28px;overflow-y:auto;flex:1 1 auto;font-size:14px;line-height:1.78;color:#cfdbf3}
  #pbody h2{font-family:"Cormorant Garamond",serif;font-size:21px;color:#fff;margin:22px 0 10px;font-weight:700}
  #pbody h3{font-size:15px;color:#eaf1ff;margin:18px 0 8px;font-weight:600}
  #pbody p{margin:11px 0}
  #pbody strong{color:#fff;font-weight:700}
  #pbody em{color:#b9c8ee;font-style:italic}
  #pbody ul,#pbody ol{margin:11px 0 11px 22px}
  #pbody li{margin:5px 0}
  #pbody code{background:rgba(125,160,220,.14);padding:1px 6px;border-radius:5px;font-size:12.5px;
    font-family:ui-monospace,"Cascadia Code",Consolas,monospace;color:#e6edff}
  #pbody blockquote{margin:13px 0;padding:9px 15px;border-left:3px solid var(--line2);
    background:rgba(125,160,220,.07);border-radius:0 8px 8px 0;color:#b9c8ee;font-size:13px}
  #pbody blockquote p{margin:5px 0}
  #pbody table{border-collapse:collapse;margin:14px 0;font-size:13px;width:auto}
  #pbody th,#pbody td{border:1px solid var(--line2);padding:5px 13px;text-align:center}
  #pbody th{background:rgba(125,160,220,.13);color:#fff;font-weight:600}
  #pbody hr{border:none;border-top:1px solid var(--line);margin:20px 0}
  #pbody svg{max-width:100%;height:auto;display:block;margin:14px auto}
  /* 参考解答折叠块：默认收起，点开才见答案 */
  #pbody details.ans{margin:16px 0;border:1px solid rgba(251,191,36,.28);border-radius:11px;
    background:rgba(251,191,36,.05);overflow:hidden}
  #pbody details.ans>summary{cursor:pointer;list-style:none;padding:11px 15px;font-size:13px;
    font-weight:600;color:#ffe7a8;display:flex;align-items:center;gap:8px;user-select:none}
  #pbody details.ans>summary::-webkit-details-marker{display:none}
  #pbody details.ans>summary::before{content:'🔒';font-size:14px}
  #pbody details.ans[open]>summary::before{content:'🔓'}
  #pbody details.ans>summary .hint{font-weight:400;color:var(--muted);font-size:11.5px;margin-left:auto}
  #pbody details.ans>.ansbody{padding:2px 15px 13px;border-top:1px dashed rgba(251,191,36,.22)}
  #pbody a.wl{color:#9fd0ff;border-bottom:1px dashed rgba(159,208,255,.5);cursor:pointer;text-decoration:none}
  #pbody a.wl:hover{color:#fff;border-bottom-color:#fff;background:rgba(159,208,255,.12)}
  #pbody .katex{font-size:1.02em}
  #pfoot{flex:none;padding:11px 22px 13px;border-top:1px solid var(--line);
    font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  #pfoot .st{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:14px;border:1px solid var(--line);font-weight:600;letter-spacing:.3px}

  /* ── 悬停预览卡 ──────────────────────────────────────── */
  #card{position:fixed;z-index:40;max-width:280px;padding:13px 15px;border-radius:13px;
    background:var(--glass);border:1px solid var(--line2);backdrop-filter:blur(16px);
    box-shadow:0 14px 44px rgba(0,0,0,.55);pointer-events:none;opacity:0;transition:opacity .14s;display:none}
  #card.show{opacity:1;display:block}
  #card .ct{font-weight:700;font-size:14px;color:#fff;margin-bottom:6px;display:flex;align-items:center;gap:7px}
  #card .ct .cd{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor}
  #card .cs{font-size:12.5px;line-height:1.6;color:#c2d0ee}
  #card .cj{margin-top:9px;font-size:11.5px;color:var(--cyan);font-weight:600}

  /* ── 浮层：图例 / 帮助 / 提示 / 进度开关 ─────────────────── */
  #legend{position:absolute;left:18px;bottom:46px;z-index:5;padding:12px 14px;border-radius:13px;
    background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--line);
    box-shadow:0 12px 40px rgba(0,0,0,.4);font-size:11px;min-width:172px;
    transition:transform .35s cubic-bezier(.22,.9,.3,1)}
  #legendBody{transition:opacity .2s}
  #legend .cap{color:var(--muted);font-weight:500;margin-bottom:7px;letter-spacing:.3px;font-size:10px;text-transform:uppercase}
  #legend .row{display:flex;align-items:center;gap:8px;margin:4px 0;color:#c7d4ee}
  #legend .dot{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor}
  #legend .ln{width:15px;height:0;border-top:2px solid currentColor;flex:none}
  #legend .sep{height:1px;background:var(--line);margin:8px 0}
  #legendTab{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:6px;
    border:1px solid var(--line);background:rgba(255,255,255,.05);color:#bcccf0;cursor:pointer;
    font-size:12px;line-height:1;display:grid;place-items:center;z-index:1;transition:.15s}
  #legendTab:hover{color:#fff;background:rgba(255,255,255,.14)}
  #legend.collapsed{transform:translateX(calc(-100% + 30px))}
  #legend.collapsed #legendBody{opacity:0;pointer-events:none}
  #toggles{position:absolute;right:16px;bottom:46px;z-index:5;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .tg{display:flex;align-items:center;gap:8px;font-size:11.5px;color:#c7d4ee;cursor:pointer;
    padding:7px 11px;border-radius:20px;background:var(--glass);border:1px solid var(--line);backdrop-filter:blur(10px);transition:.15s}
  .tg:hover{border-color:var(--line2);color:#fff}
  .tg.on{border-color:var(--cyan);color:#cdf6ff}
  .tg .sw{width:26px;height:14px;border-radius:8px;background:rgba(255,255,255,.12);position:relative;transition:.15s;flex:none}
  .tg .sw::after{content:"";position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#9fb0d6;transition:.15s}
  .tg.on .sw{background:rgba(34,211,238,.4)} .tg.on .sw::after{left:14px;background:#22d3ee}
  #hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:5;
    font-size:11.5px;color:var(--muted);letter-spacing:.3px;padding:7px 15px;border-radius:24px;
    background:rgba(10,16,30,.55);border:1px solid var(--line);backdrop-filter:blur(8px);
    font-style:italic;animation:fade 1s ease both, hintout .8s ease 9s forwards;pointer-events:none}
  @keyframes hintout{to{opacity:0;visibility:hidden}}
  @keyframes fade{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
  /* 专注阅读时，右侧浮层让位（进度开关藏起、提示条隐藏）*/
  body.reading #toggles{opacity:0;pointer-events:none}
  body.reading #hint{display:none}

  /* 标签 */
  .lbl{position:absolute;top:0;left:0;will-change:transform;font-size:12px;font-weight:500;
    letter-spacing:.2px;white-space:nowrap;color:#dbe6ff;padding:2px 8px;border-radius:7px;
    background:rgba(8,13,26,.5);border:1px solid rgba(130,165,225,.12);
    text-shadow:0 1px 6px rgba(0,0,0,.7);transition:opacity .22s,color .2s;transform:translate(-50%,-160%);}
  .lbl.sel{color:#fff;font-weight:700;font-size:13px;border-color:rgba(255,255,255,.5);background:rgba(12,20,40,.88)}
  .lbl.anc{color:#ffe7a8;border-color:rgba(251,191,36,.5);background:rgba(30,22,6,.72)}
  .lbl.desc{color:#bdf3fb;border-color:rgba(34,211,238,.5);background:rgba(6,26,30,.72)}
  .lbl.ctx{color:#dbe6ff;border-color:rgba(165,182,225,.4);background:rgba(10,16,32,.66)}
  .lbl.dim{opacity:.14}
  .lbl.hide{opacity:0}
  .lbl .drill{opacity:.55;font-size:10px;margin-left:4px}

  #footer{position:fixed;bottom:0;left:0;z-index:5;padding:5px 12px;font-size:10.5px;color:var(--muted);
    background:linear-gradient(90deg,rgba(7,11,22,.7),transparent);letter-spacing:.2px}
  #footer a{color:#9fb6e6;text-decoration:none} #footer a:hover{color:#fff}

  #err{position:fixed;inset:0;display:none;place-items:center;text-align:center;color:#fff;font-size:15px;padding:40px;z-index:99;background:var(--bg0)}
  @media (max-width:720px){
    #search{width:120px} #search:focus{width:150px}
    #panel{width:88vw;max-width:94vw}
    #legend{transform:scale(.9);transform-origin:bottom left}
  }
</style>
</head>
<body>
  <div id="topbar">
    <button class="navbtn" id="back" title="后退" disabled>‹</button>
    <button class="navbtn" id="fwd" title="前进" disabled>›</button>
    <button class="navbtn" id="home" title="回到顶层">⌂</button>
    <div id="crumbs"></div>
    <div id="searchWrap">
      <input id="search" type="text" placeholder="搜索概念…" autocomplete="off" spellcheck="false">
      <div id="results"></div>
    </div>
  </div>

  <div id="app">
    <div id="graph">
      <canvas id="scene"></canvas>
      <div id="labels"></div>
    </div>
    <!-- 图区浮层：移到 #graph 之外，专注阅读时图缩成小地图也不会把它们一起裹进去 -->
    <div id="legend"><button id="legendTab" title="收起 / 展开图例">‹</button><div id="legendBody"></div></div>
    <div id="toggles">
      <div class="tg" id="tgProgress"><span class="sw"></span>进度层</div>
    </div>
    <div id="hint">拖拽旋转 · 滚轮缩放 · 单击选中（高亮依赖链）· 双击容器下钻 · 点空白处取消</div>
    <button id="mapToggle" title="收起 / 展开小地图">⤓ 收起地图</button>
    <div id="peek">
      <div class="ph"><span class="pd" id="peekDot"></span><span class="pt" id="peekTitle"></span><button class="px" id="peekClose">×</button></div>
      <div class="ps" id="peekSum"></div>
      <div class="pb"><button id="peekRead">阅读全文 📖</button><button id="peekDrill">钻入下一层 ⤵</button></div>
    </div>
    <div id="panel">
      <div id="splitter"></div>
      <div id="phead">
        <div id="pctrls">
          <button id="pReading" title="专注阅读 / 收回分屏">⤢</button>
          <button id="pClose" title="关闭">×</button>
        </div>
        <span id="pbadge"></span>
        <div id="ptitle"></div>
      </div>
      <div id="pbody"></div>
      <div id="pfoot"></div>
    </div>
  </div>

  <div id="card"></div>
  <div id="footer">© <a href="https://github.com/JKhellai" target="_blank" rel="noopener">JKhellai</a> · 数学知识体系 · <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a></div>
  <div id="err">⚠️ 3D 引擎或数据加载失败。请在能访问 cdnjs.cloudflare.com 的环境下打开本文件。</div>

<script>
"use strict";
// ════════════════════════════════════════════════════════════════════════

const RAW = {"nodes":[{"id":"alg_algebra","label":"代数","parent":null,"summary":"研究「运算与结构」的分支：对象如何在加、乘、复合等运算下结合，以及这些运算服从哪些定律（群、环、域、向量空间）。","depth":0,"isContainer":true,"isTop":true,"role":"discipline","color":"#979AFF","ring":1,"bearing":0,"popupLinks":[{"id":"fond_fondamenta","text":"地基"}],"body":"\n代数(algebra)问的不是「多大」、也不是「在哪」，而是：**一堆对象在某种运算下如何结合，又有哪些规律恒成立**。把「运算 + 它满足的定律」抽象出来单独研究，就得到群、环、域、向量空间这些**结构**。它用的语言——命题、集合、函数——在 <a class=\"wl\" data-id=\"fond_fondamenta\">地基<\/a> 里已经备齐；代数所做的，是在这套语言之上，追问对象之间「运算法则」本身。"},{"id":"alg_anelli","label":"环","parent":"alg_algebra","summary":"环是带加法与乘法的集合:加法成交换群,乘法结合,分配律把二者锁定;减法在任何环中天然存在,「负负得正」是定理而非口诀。","depth":1,"isContainer":false,"isTop":false,"role":null,"color":"#979AFF","ring":1,"bearing":0,"popupLinks":[{"id":"num_aritmetica","text":"自然数的算术"},{"id":"alg_gruppi","text":"群"},{"id":"fond_proposizioni","text":"排斥或"},{"id":"fond_insiemi","text":"外延原则"}],"body":"\n## 两种运算如何同居\n\n群刻画一种运算的良好品行。可算术从来不是独奏:ℕ 上加法与乘法并肩而立,且由分配律 k·(m+n) = k·m + k·n 锁在一起——那条我们在<a class=\"wl\" data-id=\"num_aritmetica\">自然数的算术<\/a>里亲手证过的定律,正是两种运算之间唯一的、也是全部的纽带:没有它,加与乘不过是同一集合上互不相识的两台机器,「乘法是重复的加法」这层血缘将无从谈起。把「一个加法群 + 一个结合的乘法 + 分配律」提炼成公理,就得到代数的第二座主要建筑。\n\n## 定义\n\n**定义.** 一个**环**(ring)是一个三元组 (R, +, ·),其中 R 是集合,+ 与 · 是 R 上的两个二元运算,满足:\n\n- **(R1)** (R, +) 是交换群。其单位元记 **0**(称零元),a 的加法逆记 **−a**。\n- **(R2)** · 满足结合律:∀a, b, c ∈ R, (a·b)·c = a·(b·c)。\n- **(R3) 分配律(distributivity)**,左右两条:∀a, b, c ∈ R, a·(b+c) = a·b + a·c,且 (a+b)·c = a·c + b·c。\n\n若乘法另有单位元 **1**(∀a, 1·a = a = a·1),称**含幺环**(ring with identity);若乘法交换,称**交换环**(commutative ring)。(各家著作约定不一:有的把含幺写进环的定义。我们按上述办;翻阅他书时留意核对——这类约定差异在数学里寻常,警觉即可。)\n\n请读出定义里的**不对称**:对加法,我们索要一个完整的交换群;对乘法,只要结合律——不要求逆元,甚至不要求单位元。这不是吝啬,是忠实于样本:将来的 ℤ 里,乘法的逆几乎无人拥有(2 的倒数不是整数),公理若强行索要,就把最重要的样本拒之门外了。公理化的分寸,正在于向真实的样本看齐。\n\n分配律为何要左右两条?因为乘法未必交换:若交换,一条可推出另一条;一般情形二者独立,缺一不可。\n\n记号照旧从简:a·b 写 ab;乘法优先于加法(ab + c 读作 (a·b) + c);并且——请留意这一刻——定义\n\na − b := a + (−b)。\n\n**减法在任何环中天然存在。** ℕ 所缺的那件东西,在环里由 R1 直接担保:这并非额外规定,而是「加法成交换群」的逻辑后果——方程 x + a = b 在环中恒有唯一解 x = b − a(<a class=\"wl\" data-id=\"alg_gruppi\">群<\/a>那节练习的定理,换上加法记号)。当然,眼下我们手里还没有一个装着全体整数的环;把 ℤ 造出来并逐条核验 R1–R3,是不远处的工程。此处先把「住所」的图纸画好。\n\n## 例子:把逻辑抬升成环\n\n含两种运算的严格样本,手头的材料已足够搭出一个,而且来路漂亮。取任意集合 X,在幂集 P(X) 上设两种运算:乘法取交 ∩;加法取**对称差**(symmetric difference)\n\nA Δ B := (A ∖ B) ∪ (B ∖ A)\n\n——「恰属其一」的元素全体。还记得命题那节辨析过的<a class=\"wl\" data-id=\"fond_proposizioni\">排斥或<\/a>么:x ∈ A Δ B 当且仅当「x ∈ A 与 x ∈ B 恰有一真」。于是这一对运算正是逻辑联结词的又一次抬升,与当年「∪∩∖ 即 ∨∧¬」一脉相承:\n\n| 集合层 | 逻辑层 |\n|---|---|\n| A Δ B | 排斥或(恰一为真) |\n| A ∩ B | ∧ |\n| ∅ | 恒假 |\n| X | 恒真 |\n\n**断言.** (P(X), Δ, ∩) 是含幺交换环:零元为 ∅,幺元为 X,且每个 A 的加法逆是 **A 自己**——A Δ A = ∅,因为「恰属其一」对同一个集合无人能满足。\n\n核验的路数全是旧法:把成员资格翻译到逻辑层,化为真值表可验的等价,再用<a class=\"wl\" data-id=\"fond_insiemi\">外延原则<\/a>收口。示范最短的一条——A Δ ∅ = A:x ∈ A Δ ∅ ⟺ 「x∈A 与 x∈∅ 恰有一真」⟺ x ∈ A(因 x ∈ ∅ 恒假)。其余各条(Δ 的结合律与交换律、∩ 对 Δ 的分配律)同一路数,只是真值表更长;Δ 的结合律是其中最考耐心的一条,愿意磨一遍的读者会得到一次扎实的训练。\n\n这个环的脾气与你将来熟识的数环很不同:人人是自己的加法逆(a = −a),还藏着文末要谈的另一桩怪事——它提醒我们,公理圈定的疆域比「数」辽阔得多。\n\n## 第一批定理:零元与负号的规矩\n\n与群那节一样,以下只用公理推演、不看元素的脸,故对一切环生效。群的两条定理将反复出场:消去律,与逆元的唯一性。\n\n**定理 1.** ∀a ∈ R, 0·a = 0 = a·0。\n\n**证明.** 由零元的资格,0 + 0 = 0。两边右乘 a,左边用分配律展开:\n\n0·a + 0·a = (0 + 0)·a = 0·a = 0·a + 0。\n\n视作交换群 (R, +) 中的等式 0·a + 0·a = 0·a + 0,左消去 0·a,得 0·a = 0。另一半同理(左乘并用另一条分配律——两条分配律在此各上岗一次)。∎\n\n读出它的意味:**乘法公理对零元只字未提,分配律却强迫乘法尊重加法的零**——「乘以零得零」不是规定,是两种运算缔结之后的必然。\n\n**定理 2.** ∀a, b ∈ R, (−a)·b = −(a·b) = a·(−b)。\n\n**证明.** 验证 (−a)·b 配得上「a·b 的加法逆」这一身份:\n\na·b + (−a)·b = (a + (−a))·b = 0·b = 0,\n\n三步依次是:分配律、逆元、定理 1。而加法逆唯一(群那节的定理 2),故 (−a)·b = −(a·b)。另一半同理。∎\n\n这条定理的日常面孔是「负号可以从乘积里提出」。它的著名推论——那句小学口诀——留给你亲手确立。\n\n## 一道激活练习\n\n设 R 是环,a, b ∈ R。证明\n\n(−a)·(−b) = a·b。\n\n「负负得正」从口诀升格为定理的一刻。(提示:两步。先用定理 2 把 (−a)·(−b) 化成 −(某物);随后只剩一问——−(−x) 是什么?在群里,「x 的逆」的逆是谁,逆元的唯一性会替你回答。)\n\n## 参考解答\n\n(建议先自己写完再看。)\n\n第一步,提出左因子的负号(定理 2 之「(−a)·c = −(a·c)」,取 c = −b),再提出右因子的(定理 2 另一半):\n\n(−a)·(−b) = −( a·(−b) ) = −( −(a·b) )。\n\n于是只剩一问:−(−(a·b)) 是否等于 a·b?\n\n设 x ∈ R。等式 x + (−x) = 0 有两种读法:它既说 −x 是 x 的加法逆,也说 **x 是 −x 的加法逆**。而群中逆元唯一——−x 的逆只有一个,记作 −(−x);既然 x 具此资格,便有 −(−x) = x。取 x = a·b,得 −(−(a·b)) = a·b。\n\n合起来:(−a)·(−b) = a·b。∎\n\n回味:这句口诀的根,一半在分配律(定理 2 的来源),一半在逆元唯一性。在公理体系中,学校里背诵的规则没有被「规定」的位置——它要么被证明,要么不成立;此处,它被证明了。\n\n## 零因子:乘法的一桩隐情\n\n环的公理对乘法宽容,宽容自有后果。数的世界里你习惯了「两数之积为零,必有一者为零」;环并不担保这一点。就在上面的幂集环里:取 X = {1, 2},则 {1} ∩ {2} = ∅——两个**非零**元素(谁也不是 ∅),乘积却是零元。这样的元素称**零因子**(zero divisor)。\n\n没有零因子、含幺、交换、且 1 ≠ 0 的环,称**整环**(integral domain)——「整」字预告了它的样板:将来的 ℤ 正是整环,而「ℤ 无零因子」届时会是一条需要证明的定理。整环里,乘法的消去律失而复得:a ≠ 0 且 ab = ac,则 a·(b − c) = ab − ac = 0,无零因子便强迫 b − c = 0,即 b = c——尽管乘法逆元依旧缺席。可见「能消去」与「有逆元」并非一事:前者只须无人作梗,后者才是真正的奢侈。\n\n## 往前看一步\n\n环里加法十全十美,乘法却仍留两处余地:未必有幺元,非零元未必可逆。把这两处余地也一并取消——要求 1 存在、且每个非零元素都有乘法逆——乘法便在 R ∖ {0} 上自成一个交换群,加乘两边终于平起平坐。这样的结构是数系的最终居所之一,ℚ 与 ℝ 都将以它的身份登场:域。","refs":"Amann–Escher, Analysis I §I.8"},{"id":"alg_gruppi","label":"群","parent":"alg_algebra","summary":"群是带一个运算的集合,满足结合律、有单位元、人人有逆元;它把「可撤销的运算」公理化,一条抽象证明同时在所有具体世界里生效。","depth":1,"isContainer":false,"isTop":false,"role":null,"color":"#979AFF","ring":0,"bearing":1,"popupLinks":[{"id":"fond_composizione","text":"复合与逆"},{"id":"alg_anelli","text":"环"}],"body":"\n## 同一副面孔,第三次出现\n\n回想两处看似无关的风景。其一,<a class=\"wl\" data-id=\"fond_composizione\">复合与逆<\/a>那节:函数的复合满足结合律,恒等函数是单位,双射人人可逆——当时我说,记住这股气味。其二,上一节的 (ℕ, +):结合律有了,单位元 0 有了,唯独逆元缺席——x + 3 = 1 无解,正是这个缺口让 ℕ 显得残缺。\n\n两处风景,元素的身份毫不相干——一处是函数,一处是数——可**运算遵守的规矩**几乎逐条重合。十九世纪的代数学家们由此走出了一步影响深远的棋:不再问「元素是什么」,只问「运算守什么规矩」。把规矩本身写成公理、研究一切守这套规矩的世界——这就是代数(algebra)的开端,而第一套规矩,叫群。\n\n## 定义\n\n先把「运算」说严格。集合 G 上的一个**二元运算**(binary operation),就是一个函数 ∗ : G × G → G,习惯把 ∗((a,b)) 写作 a ∗ b。注意「函数到 G」这五个字已经悄悄办妥了一件事:任意两个元素运算的结果**仍落在 G 内**(封闭性)——它不必单列为公理,是「运算是函数」的直接后果。这是函数语言的又一次效力。\n\n**定义.** 一个**群**(group)是一个偶对 (G, ∗),其中 G 是非空集合,∗ 是 G 上的二元运算,满足三条公理:\n\n- **(G1) 结合律(associativity)**:∀a, b, c ∈ G, (a ∗ b) ∗ c = a ∗ (b ∗ c)。\n- **(G2) 单位元(identity element)**:∃e ∈ G, ∀a ∈ G, e ∗ a = a = a ∗ e。\n- **(G3) 逆元(inverse element)**:∀a ∈ G, ∃b ∈ G, a ∗ b = e = b ∗ a。\n\n(G3 里的 e 指 G2 所给的那一个;严格地讲,G2 与 G3 应连写成一个嵌套的量词语句「∃e (… ∧ ∀a ∃b …)」——稍后证明了 e 的唯一性,这层小心就可以放下了。)\n\n三条公理无一是新面孔:结合律与单位元在复合那节逐字见过,逆元正是 ℕ 所缺的那味。群,就是「**可撤销的运算**」的公理化:任何一步操作,都存在恰好抵销它的另一步。\n\n若再多守一条**交换律** ∀a,b, a ∗ b = b ∗ a,称 (G, ∗) 为**交换群**,或依传统称**阿贝尔群**(abelian group)。注意:交换律**不在**群的定义之内——这不是疏忽,是刻意。下面立刻会看到一个堂堂正正、却不交换的群。\n\n记号约定:抽象讨论时常省去 ∗,把 a ∗ b 写作 ab,单位元写 e,a 的逆写 a⁻¹(待证唯一后,这个记号才算名正言顺);若运算本身是某种「加法」,则改写 +、0、−a。记号随场合换装,公理始终是同三条。\n\n## 例子\n\n**旗舰例:一个集合的全体双射。** 取任意非空集合 X,令 S(X) 为 X 到自身的全体双射所成的集合,运算取复合 ∘。逐条验收,而且**每条都是已经建立的定理**:复合的衔接合法且双射的复合仍是双射(故 ∘ 确是 S(X) 上的二元运算);结合律——复合那节的定理;单位元——id_X;逆元——「可逆 ⟺ 双射」。一条都不必新证,(S(X), ∘) 是群,称 X 上的**对称群**(symmetric group)。请体会这一刻:我们的第一个群,完全用地基里的材料搭成,没有借用任何尚未建立之物。\n\n最小的非平凡样本:X = {1, 2}。S(X) 恰有两个元素——恒等 id 与对换 τ(把 1、2 互换)。全部运算结果列成一张表(行 ∗ 列):\n\n| ∘ | id | τ |\n|---|----|---|\n| **id** | id | τ |\n| **τ** | τ | id |\n\n读出几件事:τ ∘ τ = id,即 τ 的逆是它自己——「撤销一次对换」就是再换一次;整张表关于对角线对称,这个小群是交换的。\n\n**平凡群**:单元素集 {e},运算只能是 e ∗ e = e。三条公理空洞而严格地成立——最小的群。\n\n**借用的预览**(这些数系尚待构造,公理逐条核验留到各自建成之日):(ℤ, +) 是交换群,0 为单位、−a 为逆;(ℚ∖{0}, ·) 是交换群,1 为单位、倒数为逆——注意必须剔除 0,它没有乘法逆。\n\n**反例:(ℕ, +) 不是群。** G1、G2 成立而 G3 不成立:除 0 外无人有逆——若 n + m = 0 而 n ≠ 0,写 n = S(k),则 S(k) + m = S(k + m) = 0,与 Peano 公理「0 不是后继」相抵。顺带一说,「结合律 + 单位元、唯缺逆元」的结构也有自己的名字,**幺半群**(monoid)——ℕ 在 + 下正是一个交换幺半群。它并非残次品,只是另一物种;但「解方程」这件事,确实要等逆元到位才谈得上。\n\n**反例:三个元素以上,对称群不交换。** 取 X = {1, 2, 3},f 对换 1、2 而固定 3,g 对换 2、3 而固定 1。算两个复合在 1 处的值:(g ∘ f)(1) = g(2) = 3,而 (f ∘ g)(1) = f(1) = 2。在 1 处取值已不同,故 g ∘ f ≠ f ∘ g。先做哪一步,结果不同——交换律确实是额外的奢侈,不是群的本分。\n\n## 第一批定理:在公理上行走\n\n现在展示这一步抽象的效力。以下证明**只准使用三条公理**,不许看元素的脸——因此它们一经写下,就同时在对称群、在 ℤ、在将来你遇到的每一个群里生效。\n\n**定理 1(单位元唯一).** 群中满足 G2 的元素只有一个。\n\n**证明.** 设 e、e′ 都满足 G2。把 e′ 当单位元用:e = e ∗ e′;把 e 当单位元用:e ∗ e′ = e′。故 e = e′。∎ (两行,但请看清每行各动用了谁的资格。)\n\n**定理 2(逆元唯一).** 对任意 a ∈ G,满足 G3 的 b 只有一个。\n\n**证明.** 设 b、b′ 都是 a 的逆。则\n\nb = b ∗ e = b ∗ (a ∗ b′) = (b ∗ a) ∗ b′ = e ∗ b′ = b′。∎\n\n请把这串等式与复合那节「逆函数唯一」的证明并排放——**一字不差**。当时我们以为是在证一条关于函数的引理;今天才看清,那其实是一条群的定理,我们早已在群里工作,只是尚无此名。这正是公理化方法的全部力量:一次证明,处处生效。从此 a⁻¹ 这个记号名正言顺。\n\n**定理 3(消去律 cancellation laws).** 在群中,a ∗ b = a ∗ c ⟹ b = c;同样 b ∗ a = c ∗ a ⟹ b = c。\n\n**证明.** 设 a ∗ b = a ∗ c。两边左乘 a⁻¹:a⁻¹ ∗ (a ∗ b) = a⁻¹ ∗ (a ∗ c);结合律挪括号:(a⁻¹ ∗ a) ∗ b = (a⁻¹ ∗ a) ∗ c;即 e ∗ b = e ∗ c,即 b = c。右侧同理(右乘 a⁻¹)。∎\n\n消去律值得一句旁白:在 ℕ 里「两边消去同一个加数」当然也对,但那需要对 ℕ 的具体构造做一番归纳;在群里它是三行公理推演。具体世界里费力的事实,在抽象世界里常常是公理的近邻——选好公理,就是选好了省力的高地。\n\n## 一道激活练习\n\n设 (G, ∗) 是群,a, b ∈ G。证明方程\n\na ∗ x = b\n\n在 G 中**恰好有一个**解,并把解写出来。(提示:「恰好一个」照旧拆作存在与唯一两半。存在性——动手构造,想想该往 b 的左边搁什么;唯一性——定理 3 正候着。也请顺带想一想:这道题在 (ℕ, +) 里为何会失败,失败在哪一半?)\n\n## 参考解答\n\n(建议先自己写完再看。)\n\n**存在性.** 取候选 x₀ := a⁻¹ ∗ b,验证:\n\na ∗ (a⁻¹ ∗ b) = (a ∗ a⁻¹) ∗ b = e ∗ b = b。\n\n三步分别用了结合律、G3、G2——候选合格。\n\n**唯一性.** 设 x、x′ 都满足 a ∗ x = b = a ∗ x′。由定理 3(左消去),x = x′。∎\n\n故解恰为 x = a⁻¹ ∗ b。在 (ℕ, +) 中,方程 3 + x = 1 失败在**存在性**那一半:构造解需要 a 的逆,而 ℕ 里 3 没有逆——并非我们不够聪明,是材料里确实没有这味原料。如何在 ℕ 的基础上**严格地补足**这味原料而不只是口头宣布,正是数系构造的下一项工程。\n\n## 往前看一步\n\n群管一种运算。可你最熟悉的那些数的世界里,从来是**两种**运算并肩而立——加法与乘法,而且二者绝非各自为政:分配律 k·(m+n) = k·m + k·n(上一节刚刚证过的那条)把它们锁在一起。一个集合,两种运算,一纸盟约——这样的结构该如何公理化,各公理又各司何职,这是 <a class=\"wl\" data-id=\"alg_anelli\">环<\/a> 要回答的问题。","refs":"Amann–Escher, Analysis I §I.7"},{"id":"an_analisi","label":"分析","parent":null,"summary":"研究「极限与连续变化」的分支：以极限为核心，严格处理逼近、连续、导数、积分与无穷过程。","depth":0,"isContainer":false,"isTop":true,"role":"discipline","color":"#FF7F50","ring":1,"bearing":0,"popupLinks":[{"id":"fond_fondamenta","text":"地基"}],"body":"\n分析(analysis)的核心只有一个字：**极限**。一旦我们想严格地谈「越来越接近」「无限细分再累加」「瞬时变化率」，就进入了分析的领地——连续、导数、积分、级数，全是极限这一观念结出的果实。它的语言取自 <a class=\"wl\" data-id=\"fond_fondamenta\">地基<\/a>，但它真正的内核——极限与完备性——既不来自纯粹的运算、也不来自空间直观，是不可被还原的。正因如此，它真正的力量要等到数系一路构造到实数、补齐「没有缝隙」的完备性之后，才完全释放。"},{"id":"fond_cardinalita","label":"等势与可数性","parent":"fond_fondamenta","summary":"「一样多」= 存在双射；与 ℕ 等势的无穷集叫可数。无穷处部分可与整体一样多，而 Cantor 对角线证明无穷竟分大小——幂集永远更大。","depth":1,"isContainer":false,"isTop":false,"role":null,"color":"#A9A9A9","ring":7,"bearing":0,"popupLinks":[{"id":"fond_iniettive_suriettive","text":"双射"},{"id":"fond_equivalenza","text":"等价关系"},{"id":"fond_composizione","text":"可逆 ⟺ 双射"},{"id":"fond_relazioni","text":"笛卡尔积"},{"id":"fond_insiemi","text":"外延原则"},{"id":"num_n","text":"Peano 公理与自然数"}],"body":"\n## 不数数,怎么比多少\n\n一个上古的难题:牧人不识数,怎么知道羊有没有丢?办法是**配对**——出栏时每只羊扔一颗石子进罐,归栏时每只羊取一颗出来;罐子空了,羊就齐了。他自始至终不知道羊「有几只」,却完全有把握羊和石子「一样多」。\n\n这给了我们一个深刻的启示:**「一样多」比「有几个」更原始**——比较不需要先数数,配对就够了。而「完美配对」恰恰是我们刚刚锻造完的工具:<a class=\"wl\" data-id=\"fond_iniettive_suriettive\">双射<\/a>。于是一个古老的直觉,今天升格为定义。\n\n## 等势\n\n两个集合 A、B 称为**等势**(equipotent),记 A ≈ B,若存在一个双射 f : A → B。\n\n它的行为像极了<a class=\"wl\" data-id=\"fond_equivalenza\">等价关系<\/a>,三条全占——而且每一条都恰好由上一节的一条定理担保:\n\n- **自反** A ≈ A:恒等函数 id_A 是双射。\n- **对称** A ≈ B ⟹ B ≈ A:双射 f 可逆,而 f⁻¹ 自己也是双射——因为 f⁻¹ 有逆(就是 f),由<a class=\"wl\" data-id=\"fond_composizione\">可逆 ⟺ 双射<\/a>即得。\n- **传递** A ≈ B ∧ B ≈ C ⟹ A ≈ C:双射的复合是双射(上节引理 1+2)。\n\n> 一句诚实话:严格说,等价关系是「某个集合**上**的关系」,可「所有集合的集合」不是合法对象——还记得集合那节按下的罗素悖论么,这正是它的回响。所以我们说等势「像」等价关系:三条性质逐字成立、放心使用,只是别问「它是哪个集合上的关系」。\n\n## 有限、无穷、可数\n\n有了「一样多」,就能给「有 n 个」正身:A 是**有限的**(finite),若 A = ∅ 或 A ≈ {1, 2, …, n} 对某个自然数 n 成立;否则称**无穷的**(infinite)。数数,原来就是和样板集 {1,…,n} 配对。(自然数照例先按熟悉的方式借用——它的严格出生证明在不远处等着我们。)\n\n无穷集合里地位最特殊的标尺是 ℕ 自己。与 ℕ 等势的集合称**可数无穷**(countably infinite);有限或可数无穷统称**可数**(countable)。「与 ℕ 等势」说白了就是**能排成一列不重不漏的清单** a₀, a₁, a₂, …——双射 ℕ → A 就是这张清单,n ↦ 第 n 号展品。\n\n## 第一记重锤:部分可以和整体一样多\n\n现在让无穷亮出獠牙。看偶数集 E = {0, 2, 4, …}。它是 ℕ 的**真子集**——奇数全被剔除,「少了一半」。可是:\n\n**断言.** ℕ ≈ E,由 f : ℕ → E, n ↦ 2n 实现。\n\n**证明.** 单射:设 2n = 2m,除以 2 得 n = m。满射:任给 e ∈ E,按 E 的定义 e = 2k 对某个 k ∈ ℕ,于是 f(k) = e。两条都过,f 是双射。∎\n\n证明短得让人不安,结论却推翻了一条两千年的「公理」——欧几里得说「整体大于部分」。在有限世界这没错;在无穷世界,**整体可以和真部分一样多**。伽利略在十七世纪就撞见了这件事(平方数与全体自然数配对),被吓得退了回去;Cantor 的过人之处在于不退:既然定义推出如此,那就接受它——这不是悖论,是无穷的**本性**。(事实上这条性质刻画了无穷:一个集合是无穷的,当且仅当它与某个真子集等势——Dedekind 干脆拿它当无穷的定义。)\n\n更夸张的:ℤ 看着是 ℕ 的「两倍再多一」,也照样可数——清单这么排:0, 1, −1, 2, −2, 3, −3, …,左右开弓地数,谁也不漏。(ℤ 同样先借用;严格构造它正是等价类机器的第一单生意。)\n\n## ℕ×ℕ 也可数:蛇形清单\n\n再升一级。格点阵 ℕ×ℕ——<a class=\"wl\" data-id=\"fond_relazioni\">笛卡尔积<\/a>那张图的无穷版——直觉上是「无穷个无穷」,总该更大了吧?仍然不:按**反对角线**把格点排成蛇形清单,(0,0) 排第 0 号,然后 (1,0), (0,1),然后 (2,0), (1,1), (0,2),……每条反对角线 a+b = 常数 上只有有限个点,一条数完数下一条,任何 (a,b) 都会在第 a+b 条对角线上被数到——不重,不漏:\n\n<svg viewBox=\"0 0 280 240\" xmlns=\"http://www.w3.org/2000/svg\">\n  <defs>\n    <marker id=\"arr4\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto-start-reverse\">\n      <path d=\"M 0 0 L 10 5 L 0 10 z\" fill=\"#E0612F\"/>\n    <\/marker>\n  <\/defs>\n  <line x1=\"40\" y1=\"200\" x2=\"260\" y2=\"200\" stroke=\"#888\" stroke-width=\"1.2\"/>\n  <line x1=\"40\" y1=\"200\" x2=\"40\" y2=\"20\" stroke=\"#888\" stroke-width=\"1.2\"/>\n  <circle cx=\"70\" cy=\"170\" r=\"4\" fill=\"#333\"/>\n  <circle cx=\"120\" cy=\"170\" r=\"4\" fill=\"#333\"/>\n  <circle cx=\"170\" cy=\"170\" r=\"4\" fill=\"#333\"/>\n  <circle cx=\"220\" cy=\"170\" r=\"4\" fill=\"#333\"/>\n  <circle cx=\"70\" cy=\"120\" r=\"4\" fill=\"#333\"/>\n  <circle cx=\"120\" cy=\"120\" r=\"4\" fill=\"#333\"/>\n  <circle cx=\"170\" cy=\"120\" r=\"4\" fill=\"#333\"/>\n  <circle cx=\"70\" cy=\"70\" r=\"4\" fill=\"#333\"/>\n  <circle cx=\"120\" cy=\"70\" r=\"4\" fill=\"#333\"/>\n  <circle cx=\"70\" cy=\"34\" r=\"4\" fill=\"#333\"/>\n  <line x1=\"76\" y1=\"166\" x2=\"113\" y2=\"172\" stroke=\"#E0612F\" stroke-width=\"1.3\" marker-end=\"url(#arr4)\"/>\n  <line x1=\"114\" y1=\"164\" x2=\"77\" y2=\"126\" stroke=\"#E0612F\" stroke-width=\"1.3\" marker-end=\"url(#arr4)\"/>\n  <line x1=\"76\" y1=\"114\" x2=\"113\" y2=\"76\" stroke=\"#E0612F\" stroke-width=\"1.3\" marker-end=\"url(#arr4)\"/>\n  <line x1=\"126\" y1=\"76\" x2=\"163\" y2=\"114\" stroke=\"#E0612F\" stroke-width=\"1.3\" marker-end=\"url(#arr4)\"/>\n  <line x1=\"176\" y1=\"116\" x2=\"213\" y2=\"164\" stroke=\"#E0612F\" stroke-width=\"1.3\" marker-end=\"url(#arr4)\"/>\n  <text x=\"62\" y=\"190\" font-size=\"11\" fill=\"#555\">0<\/text>\n  <text x=\"124\" y=\"190\" font-size=\"11\" fill=\"#555\">1<\/text>\n  <text x=\"174\" y=\"190\" font-size=\"11\" fill=\"#555\">2<\/text>\n  <text x=\"224\" y=\"190\" font-size=\"11\" fill=\"#555\">3<\/text>\n  <text x=\"26\" y=\"174\" font-size=\"11\" fill=\"#555\">0<\/text>\n  <text x=\"26\" y=\"124\" font-size=\"11\" fill=\"#555\">1<\/text>\n  <text x=\"26\" y=\"74\" font-size=\"11\" fill=\"#555\">2<\/text>\n<\/svg>\n\n由此立刻多米诺:ℚ(有理数)也可数——每个有理数无非「一对整数」打了个商,塞进 ℤ×ℤ 的清单里挑着数即可。(细节将来 ℚ 建成后补严;眼下记住结论与方法:**清单化 = 可数**。)\n\n到这里,你可能开始怀疑:难道所有无穷都一样多,「无穷」就是一个大箩筐?\n\n## 第二记重锤:Cantor 定理——无穷分大小\n\n不。Cantor 在 1891 年给出的论证,是整个数学里最漂亮的几页之一。先备一件小工具:集合 A 的**幂集**(power set) P(A),即 A 的全体子集组成的集合:P(A) := {X : X ⊆ A}。例如 P({1,2}) = {∅, {1}, {2}, {1,2}},四个元素。(「子集全体确实凑成一个合法的集合」——这我们约定接受,它是搭建集合宇宙的一条基本许可。)\n\n**定理 (Cantor).** 对**任何**集合 A,不存在满射 f : A → P(A)。\n\n**证明.** 任给一个函数 f : A → P(A)——它把每个元素 a 指派到一个子集 f(a) ⊆ A。要证 f 必不满,只需**亲手造出一个没人打中的靶点**(上上节「非满射」的标准任务:见证 + 一场 ∀ 的硬仗)。\n\n造法是绝杀的一笔。对每个 a ∈ A 问一个问题:「**a 在不在自己被指派的那个子集里?**」把答案为「不在」的收拢起来:\n\nD := { a ∈ A : a ∉ f(a) }。\n\n(这是描述法的合法用法——从已有的 A 里切,不越雷池。)D 是 A 的子集,即 D ∈ P(A),是个正经靶点。往证:∀a ∈ A, f(a) ≠ D。\n\n任取 a ∈ A,只问一件事:a ∈ D 吗?两种情形——\n\n- 若 a ∈ D:按 D 的定义,a ∉ f(a)。于是 a 这个元素,在 D 里、不在 f(a) 里——两个集合的成员资格在 a 处不同,由<a class=\"wl\" data-id=\"fond_insiemi\">外延原则<\/a>,f(a) ≠ D。\n- 若 a ∉ D:按 D 的定义(取否定),a ∈ f(a)。于是 a 在 f(a) 里、不在 D 里——同理 f(a) ≠ D。\n\n横竖 f(a) ≠ D,对一切 a 成立。D 无人打中,f 不满。∎\n\n慢放一遍这支箭。D 是按 f 本人**量身定做**的反对者:它在每个坐标 a 上,都故意跟 f(a) 唱反调——你收 a,我就不收;你不收,我偏收。于是它跟清单上**每一项**至少有一处不同,自然不在清单上。这手法叫**对角线论证**(diagonal argument):沿着「a 对 f(a)」这条对角线逐点取反。你该觉得眼熟——罗素悖论里那个「不含自身的集合的集合」,用的是同一根针;只是罗素拿它扎破了朴素集合论,Cantor 拿它量出了无穷的层级。一针两用,这针法在数学和逻辑里还会反复显灵。\n\n## 无穷的阶梯\n\nCantor 定理说:A 永远配不满 P(A)——而 A 塞**进** P(A) 倒容易(a ↦ {a} 是单射)。所以 P(A) 总是「严格更多」。把它迭代起来:\n\nℕ, P(ℕ), P(P(ℕ)), P(P(P(ℕ))), …\n\n每一级都比上一级严格更大——**无穷不是一个箩筐,是一架没有顶的阶梯**。「可数」只是这架梯子的第一蹬;从 P(ℕ) 起,清单化就永远做不到了,这样的集合称**不可数**(uncountable)。预告一句:将来实数 ℝ 建成后,我们会证明 ℝ ≈ P(ℕ)——所以**实数不可数**,实数轴在「多少」的意义上就比自然数高一整级;届时还会用小数展开把对角线再扎一次,那是这一招的经典舞台。至于「两个集合互相单射进对方,是否就等势」(答案为是,Cantor–Schröder–Bernstein 定理),以及「梯级之间还有没有中间层」,都是这条线上的好戏,留待将来。\n\n## 一道激活练习\n\n把对角线握在手心。取 A = {1, 2, 3},定义 f : A → P(A) 为\n\nf(1) = {2, 3},  f(2) = {2},  f(3) = ∅。\n\n(a) 按定理证明里的配方,算出 D = {a ∈ A : a ∉ f(a)}。\n(b) 逐一核对 D ≠ f(1)、D ≠ f(2)、D ≠ f(3),并对每个 a 指明「分歧发生在哪个元素上」。\n(c) 这个 A 有 3 个元素,P(A) 有 8 个;f 当然不可能满。那 Cantor 定理对有限集说了什么**新**东西吗?想一想定理的分量到底压在哪类集合上。\n\n## 参考解答\n\n(建议先自己写完再看。)\n\n**(a)** 逐个过堂:1 ∈ f(1) = {2,3}?否——1 入选 D。2 ∈ f(2) = {2}?是——2 落选。3 ∈ f(3) = ∅?否——3 入选。故 **D = {1, 3}**。\n\n**(b)** D 与 f(1) = {2,3}:分歧在 1(1 ∈ D 而 1 ∉ f(1))——正是 1 自己的坐标。D 与 f(2) = {2}:分歧在 2(2 ∉ D 而 2 ∈ f(2))——正是 2 自己的坐标。D 与 f(3) = ∅:分歧在 3(3 ∈ D 而 3 ∉ f(3))——正是 3 自己的坐标。看见对角线了么:**D 与第 a 张牌的分歧,恰好都发生在 a 本人身上**——这正是「量身定做的反对者」的字面意思。\n\n**(c)** 对有限集,「3 个元素打不满 8 个靶点」用数数就知道,定理确实不新。它的全部分量压在**无穷**集合上:那里「数数」失效,「部分≈整体」的怪事横行,谁也不敢担保 ℕ 打不满 P(ℕ)——而对角线给出了一个**对一切集合一视同仁**、根本不需要数数的论证。这也是个值得记住的品味:好定理的证明,常常在最危险的地方(无穷)和最平凡的地方(有限)用的是同一句话。\n\n## 往前看一步\n\n回望这九节:我们从「一句能判真假的话」起步,一路造出了集合、关系、等价、函数、双射,直到今天量出无穷的层级。地基的**语言**部分至此完工。但这一路上有多处「暂且借用」:ℕ、ℤ、ℚ、ℝ 尚未严格建立,连「平方非负」「√2 存在」也仍悬而未证。现在轮到它们了——从此我们转入**造对象**:只用这套语言,从五条朴素得近乎天真的公理出发,把自然数从虚空中造出来,再让等价类机器开工,造 ℤ、造 ℚ,直到那条没有缝隙的实数轴。第一站:<a class=\"wl\" data-id=\"num_n\">Peano 公理与自然数<\/a>。","refs":"Amann–Escher, Analysis I §I.6"},{"id":"fond_composizione","label":"复合与逆函数","parent":"fond_fondamenta","summary":"复合 g∘f 把函数接力成新函数，满足结合律、以恒等为单位；可逆 ⟺ 双射，逆函数唯一且 (g∘f)⁻¹ = f⁻¹∘g⁻¹。","depth":1,"isContainer":false,"isTop":false,"role":null,"color":"#A9A9A9","ring":6,"bearing":3,"popupLinks":[{"id":"fond_funzioni","text":"函数相等"},{"id":"alg_gruppi","text":"群"},{"id":"fond_cardinalita","text":"等势与可数性"}],"body":"\n## 接力\n\n函数最自然的玩法是**串起来用**：一个函数的输出，喂给下一个函数当输入。「先求平方、再加一」「先取等价类、再做别的」——数学里的复杂操作几乎都是简单操作的接力。这一节先把「接力」本身定成一个运算，摸清它的脾气；然后回应上一节末尾的悬念——**什么样的函数，箭头能走回去**。两件事到头来是一件：「走回去」必须用「接力」才说得清楚。\n\n## 复合\n\n设 f : A → B，g : B → C（注意衔接条件：**f 的到达域 = g 的定义域**，接力棒得递得上）。定义它们的**复合**(composition)\n\ng ∘ f : A → C，  a ↦ g(f(a))。\n\n先尽本分，验证 g∘f 真是个函数：任给 a ∈ A，f 是函数，f(a) 是 B 中唯一确定的元素；g 是函数，g(f(a)) 又是 C 中唯一确定的元素。每个输入恰好一个输出，资格合法。∎\n\n<svg viewBox=\"0 0 380 150\" xmlns=\"http://www.w3.org/2000/svg\">\n  <defs>\n    <marker id=\"arr3\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto-start-reverse\">\n      <path d=\"M 0 0 L 10 5 L 0 10 z\" fill=\"#555\"/>\n    <\/marker>\n  <\/defs>\n  <ellipse cx=\"60\" cy=\"70\" rx=\"34\" ry=\"42\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.4\"/>\n  <ellipse cx=\"190\" cy=\"70\" rx=\"34\" ry=\"42\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.4\"/>\n  <ellipse cx=\"320\" cy=\"70\" rx=\"34\" ry=\"42\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.4\"/>\n  <text x=\"60\" y=\"74\" font-size=\"14\" text-anchor=\"middle\" fill=\"#333\">A<\/text>\n  <text x=\"190\" y=\"74\" font-size=\"14\" text-anchor=\"middle\" fill=\"#333\">B<\/text>\n  <text x=\"320\" y=\"74\" font-size=\"14\" text-anchor=\"middle\" fill=\"#333\">C<\/text>\n  <line x1=\"98\" y1=\"64\" x2=\"152\" y2=\"64\" stroke=\"#555\" stroke-width=\"1.3\" marker-end=\"url(#arr3)\"/>\n  <text x=\"125\" y=\"54\" font-size=\"13\" text-anchor=\"middle\" fill=\"#333\">f<\/text>\n  <line x1=\"228\" y1=\"64\" x2=\"282\" y2=\"64\" stroke=\"#555\" stroke-width=\"1.3\" marker-end=\"url(#arr3)\"/>\n  <text x=\"255\" y=\"54\" font-size=\"13\" text-anchor=\"middle\" fill=\"#333\">g<\/text>\n  <path d=\"M 70 116 C 140 152, 240 152, 310 116\" fill=\"none\" stroke=\"#E0612F\" stroke-width=\"1.4\" marker-end=\"url(#arr3)\"/>\n  <text x=\"190\" y=\"146\" font-size=\"13\" text-anchor=\"middle\" fill=\"#E0612F\">g∘f<\/text>\n<\/svg>\n\n**记号的方向是个著名的坑**：g∘f 读「g 复合 f」，可执行顺序是**先 f 后 g**——符号从右往左吃。根源在记号 g(f(a))：a 先被里层的 f 吞掉。读 ∘ 时心里默念「**∘ = 作用在……的结果上**」就不会反。\n\n## 复合的三条脾气\n\n**(一) 不可交换。** 一般 g∘f ≠ f∘g——连两边是否都有定义都未必。就算都有定义也常不等：取 f, g : ℝ → ℝ，f(x) = x+1，g(x) = 2x，则 (g∘f)(x) = 2(x+1) = 2x+2，而 (f∘g)(x) = 2x+1。在 x = 0 处一个给 2、一个给 1，按函数相等的三件套（上一节的定义），两者不等。「先加一再翻倍」与「先翻倍再加一」当然不同——顺序就是信息。\n\n**(二) 结合律。** 设 f : A → B，g : B → C，h : C → D。则\n\nh ∘ (g∘f) = (h∘g) ∘ f。\n\n**证明.** 两边都是 A → D 的函数（定义域、到达域已同），按 <a class=\"wl\" data-id=\"fond_funzioni\">函数相等<\/a> 只剩验逐点的值。任给 a ∈ A：左边给 h((g∘f)(a)) = h(g(f(a)))；右边给 (h∘g)(f(a)) = h(g(f(a)))。逐点相同。∎\n\n证明平淡，后果不平淡：括号既然怎么放都一样，干脆不写——h∘g∘f 从此是合法记号，任意长的接力链都不必操心结合顺序。\n\n**(三) 恒等是单位。** 对任意 f : A → B：f ∘ id_A = f 且 id_B ∘ f = f（逐点一验即得）。恒等函数之于 ∘，恰如 1 之于乘法、0 之于加法——什么也不做的那个，地位最特殊。\n\n> 闻一下这股气味：一种运算（∘），满足结合律，有单位元（id），而且马上要看到「逆」。这三样东西凑在一起，是数学里出现频率最高的结构配方之一——它有个名字叫**群**，是代数主干开张的第一个概念。这里先记住气味，正式登门留待 <a class=\"wl\" data-id=\"alg_gruppi\">群<\/a>。\n\n## 复合保品质\n\n接力不糟蹋好品质。两条小引理（设 f : A → B，g : B → C）：\n\n**引理 1.** f、g 都是单射 ⟹ g∘f 是单射。\n\n**证明.** 标准开场白：设 (g∘f)(x) = (g∘f)(x′)，即 g(f(x)) = g(f(x′))。g 单射，剥掉一层得 f(x) = f(x′)；f 单射，再剥一层得 x = x′。∎（像剥洋葱：单射的本事就是「从外往里剥」。）\n\n**引理 2.** f、g 都是满射 ⟹ g∘f 是满射。\n\n**证明.** 任给 c ∈ C，倒着追射手：g 满，存在 b ∈ B 使 g(b) = c；f 满，存在 a ∈ A 使 f(a) = b。于是 (g∘f)(a) = g(f(a)) = g(b) = c。∎（满射的本事是「从外往里追」。）\n\n两条合起来：**双射的复合是双射**。\n\n## 逆函数\n\n现在回应那个悬念。f : A → B 称为**可逆**(invertible)，若存在 g : B → A，使得\n\ng ∘ f = id_A  且  f ∘ g = id_B。\n\n第一条说「先去再回，回到原地」（g 撤销 f），第二条说「先回再去，也回到原地」（f 撤销 g）。**两条都要**，一条不够——文末陷阱里有反例。\n\n**逆若存在则唯一。** 设 g、g′ 都满足上面两条。看这串推演：\n\ng = g ∘ id_B = g ∘ (f ∘ g′) = (g ∘ f) ∘ g′ = id_A ∘ g′ = g′。\n\n五步分别用了：单位、g′ 的第二条、**结合律**、g 的第一条、单位。∎ 唯一既证，专属记号有了着落：记作 **f⁻¹**。留意这个证明一个元素都没碰——全程只摆弄运算律。这种「不看内部、只用规律」的推理，正是将来代数的日常呼吸。\n\n**主定理.** f : A → B 可逆 ⟺ f 是双射。\n\n**证明.** 「⟹」设 f 可逆，逆为 g。*单射*：设 f(x) = f(x′)，两边用 g 作用：g(f(x)) = g(f(x′))，即 id_A(x) = id_A(x′)，即 x = x′。*满射*：任给 b ∈ B，取 a := g(b)，则 f(a) = f(g(b)) = id_B(b) = b——见证到手。\n\n「⟸」设 f 是双射，要亲手造出逆。任给 b ∈ B：f 满射，存在 a 使 f(a) = b；f 单射，这样的 a 至多一个。两条合并：**恰好存在一个** a 使 f(a) = b——又是 ∃!，正因唯一，「把 b 送到这个 a」才是合法的指派，得函数 g : B → A。验两条：对任意 a ∈ A，g(f(a)) 按定义是「被 f 打到 f(a) 的那个唯一元素」，而 a 自己就打中了，由唯一性 g(f(a)) = a，故 g∘f = id_A；对任意 b ∈ B，g(b) 是打中 b 的那个元素，所以 f(g(b)) = b，故 f∘g = id_B。∎\n\n回头看「⟸」的构造，会发现它就是上一节那句直觉的严格版：双射之下 B 的每个元素恰被一支箭打中，「沿箭头走回去」处处可行、绝无歧义——单射保证「无歧义」，满射保证「处处可行」，一人一岗。\n\n例子接着上一节的活：f : ℝ → ℝ, x ↦ 2x+1 已证双射，按构造其逆为 f⁻¹(b) = (b−1)/2（就是当时满射证明里解出的那个见证！）。验算：f⁻¹(f(x)) = ((2x+1)−1)/2 = x，f(f⁻¹(b)) = 2·(b−1)/2 + 1 = b。两条都过。——满射证明里「解方程找见证」的活，和「求逆函数」原来是同一件事。\n\n## 几个最容易栽跟头的地方\n\n- **f⁻¹ 不是 1/f。** 上例里 f⁻¹(x) = (x−1)/2，而 1/f(x) = 1/(2x+1)——风马牛。记号 ⁻¹ 在这里指「关于 ∘ 的逆」，不是「关于乘法的倒数」；撞车纯属历史包袱。\n- **单边撤销不够。** 取 A = {1}，B = {a, b}，f : A → B, f(1) = a，g : B → A 只能是常函数 g(a) = g(b) = 1。验 g∘f：g(f(1)) = g(a) = 1，确实 = id_A——左边撤销成立！可 f 不是双射（b 空置），也确实 (f∘g)(b) = f(1) = a ≠ b。**一条等式只担保一半品质**（细嚼主定理「⟹」的证明会发现：单射只用了第一条，满射只用了第二条），定义里两条缺一不可。\n- **复合的衔接**：写 g∘f 前先核对 f 的到达域等于 g 的定义域，对不上就是未定义——这也是「到达域是函数身份的一部分」的又一次上岗。\n\n## 一道激活练习\n\n设 f : A → B 与 g : B → C 都是双射。证明 g∘f（由引理 1、2 已知是双射，故可逆）的逆是\n\n(g∘f)⁻¹ = f⁻¹ ∘ g⁻¹。\n\n注意右边的**顺序反了过来**。先想一想为什么必须反——「先穿袜子后穿鞋」，脱的时候谁先脱？——再动手证。（提示：逆是唯一的，所以只需验证 f⁻¹∘g⁻¹ 满足逆的两条定义等式；通篇只用结合律和单位元，一个元素都不必碰。）\n\n## 参考解答\n\n（建议先自己写完再看。）思路：要证「某物是 (g∘f) 的逆」，由逆的唯一性，只需验证它满足两条定义等式。记 h := f⁻¹∘g⁻¹ : C → A（衔接合法：g⁻¹ : C → B，f⁻¹ : B → A）。\n\n**第一条** h ∘ (g∘f) = id_A：\n\n```\n(f⁻¹∘g⁻¹) ∘ (g∘f)\n= f⁻¹ ∘ (g⁻¹∘g) ∘ f     （结合律——括号随便挪）\n= f⁻¹ ∘ id_B ∘ f         （g⁻¹∘g = id_B）\n= f⁻¹ ∘ f                 （id 是单位）\n= id_A。\n```\n\n**第二条** (g∘f) ∘ h = id_C：\n\n```\n(g∘f) ∘ (f⁻¹∘g⁻¹)\n= g ∘ (f∘f⁻¹) ∘ g⁻¹     （结合律）\n= g ∘ id_B ∘ g⁻¹          （f∘f⁻¹ = id_B）\n= g ∘ g⁻¹                  （id 是单位）\n= id_C。\n```\n\n两条都成立，由逆的唯一性，(g∘f)⁻¹ = f⁻¹∘g⁻¹。∎\n\n顺序为何必须反，现在看得真切：消去要**从中间烧起**——(g∘f) 的左边只有先贴上 f⁻¹…g⁻¹ 中靠右的 g⁻¹，才能让 g⁻¹∘g 在链条中央相遇湮灭，露出里面的 f 再被 f⁻¹ 接走。穿衣是 f 先 g 后（袜子先鞋后），脱衣只能 g 先 f 后（鞋先袜后）。也再次留意：全程没碰过任何元素——和唯一性的证明一样，纯靠运算律行走。\n\n## 往前看一步\n\n地基的工具箱就此配齐：双射是「完美配对」，而且我们现在知道它可逆、可复合、复合还保双射。于是一个古老的问题第一次有了严格的问法：两个集合什么时候算「**一样多**」？答曰——它们之间存在一个双射。这个回答对有限集合不过是常识；可一旦放到无穷集合上，它将掀翻你的直觉：你会看到「部分可以和整体一样多」，也会看到「无穷与无穷竟分大小」。这就是 <a class=\"wl\" data-id=\"fond_cardinalita\">等势与可数性<\/a> 的戏——地基里最惊心动魄的一幕。","refs":"Amann–Escher, Analysis I §I.3"},{"id":"fond_equivalenza","label":"等价关系与商集","parent":"fond_fondamenta","summary":"自反、对称、传递三条全占的关系叫等价关系；它把集合切成互不相交的等价类，类的全体构成商集——数学里制造新对象的头号机器。","depth":1,"isContainer":false,"isTop":false,"role":null,"color":"#A9A9A9","ring":4,"bearing":1,"popupLinks":[{"id":"fond_relazioni","text":"关系"},{"id":"num_n","text":"自然数"},{"id":"fond_funzioni","text":"函数"}],"body":"\n## 「视为相同」\n\n数学里有个挥之不去的需求：把**不完全相同**的东西**当作相同**来处理。分数 1/2 和 2/4 写法不同，却该算同一个数；两个三角形位置不同，只要能叠合，就该算「同一个形状」；统计奇偶时，3 和 17 没有分别。每次我们都在说同一句话——「在我此刻关心的层面上，它们一样」。\n\n可「视为相同」要是随手乱用，立刻出乱子：要是「视为相同」连自己跟自己都不算相同，或者 a 同 b、b 同 c 却 a 不同 c，那「按相同归堆」这件事根本做不成。要让归堆站得住，「视为相同」必须守纪律——而需要的纪律，恰恰就是上一节备好的那三条。这绝非巧合：三条品性本来就是从「相等」身上提炼出来的，等价关系就是「**像相等一样行事**的关系」。\n\n## 定义与例子\n\n设 ~ 是集合 A 上的一个 <a class=\"wl\" data-id=\"fond_relazioni\">关系<\/a>。若 ~ 同时满足\n\n- 自反：∀x ∈ A, x ~ x；\n- 对称：∀x,y ∈ A ( x ~ y ⟹ y ~ x )；\n- 传递：∀x,y,z ∈ A ( (x ~ y ∧ y ~ z) ⟹ x ~ z )，\n\n就称 ~ 是 A 上的一个**等价关系**(equivalence relation)。习惯用波浪号 ~ 作记号，读「等价于」。\n\n例子（最后两个反例照例是命脉）：\n\n- **相等** = 本身：三条全占，是「最细」的等价关系——谁也不跟别人等价，每个元素只跟自己一堆。\n- **全关系** A×A：人人等价于人人，三条也全占，是「最粗」的——全体挤成一堆。等价关系全体就活在这两个极端之间。\n- **同奇偶**：自然数上 x ~ y ⟺ x、y 同为偶数或同为奇数。三条都成立（同自己同奇偶；同奇偶不分先后；接力两次奇偶不变）。自然数与奇偶我们暂且按你熟悉的方式用，它们的严格重建留待 <a class=\"wl\" data-id=\"num_n\">自然数<\/a>。\n- **「同一年出生」**（某群人上）：三条全占——日常语言里一切「同……」式的说法，几乎都是等价关系，这正是「视为相同」的语感来源。\n- **反例 ≤**（ℝ 上）：自反、传递，但**不对称**（2≤3 而 3≰2）。它不是等价关系——它是另一个重要物种（序关系）的代表，那条线以后再走。\n- **反例「是朋友」**：对称，未必传递（朋友的朋友不一定是朋友）。守不住接力，归堆就会归出含混的边界——这正是传递性不可或缺的原因。\n\n## 等价类\n\n有了守纪律的「视为相同」，归堆就可以动手了。对 a ∈ A，把所有与 a 等价的元素收进一个集合：\n\n[a] := { x ∈ A : x ~ a }，\n\n称为 a 的**等价类**(equivalence class)，a 叫这个类的一个**代表元**(representative)。\n\n同奇偶的例子里只有两个类：[0] = {0, 2, 4, …}（全体偶数）和 [1] = {1, 3, 5, …}（全体奇数）；并且 [0] = [2] = [4] = ⋯——**同一个类可以由它的任何成员代表**。这句话不该轻信，得证：\n\n**引理.** 设 ~ 是 A 上的等价关系，a, b ∈ A。则\n(i) a ∈ [a]；\n(ii) a ~ b ⟺ [a] = [b]。\n\n**证明.** (i) 即 a ~ a，自反性原话。（别小看这条：它保证**每个类都不空**，且每个元素都至少落在一个类里——落在自己的类里。）\n\n(ii) 「⟸」：设 [a] = [b]。由 (i)，a ∈ [a] = [b]，按定义即 a ~ b。\n\n「⟹」：设 a ~ b，证两个集合相等。按上一节的双向夹，分证两个包含。先证 [a] ⊆ [b]：任取 x ∈ [a]，即 x ~ a；又 a ~ b，由**传递**得 x ~ b，即 x ∈ [b]。再证 [b] ⊆ [a]：任取 x ∈ [b]，即 x ~ b；由 a ~ b 与**对称**得 b ~ a，再由**传递**得 x ~ a，即 x ∈ [a]。两个方向都成立，由外延原则 [a] = [b]。∎\n\n注意证明里三条性质各司其职、一条不多一条不少——这是「为什么定义恰好要这三条」的最好答案。\n\n## 类把集合切成划分\n\n把一个集合「切干净」这件事，先给个正式名字。A 的一个**划分**(partition)是一族非空子集，满足两条：**两两不相交**（任两块要么相等要么交为空），且**并起来盖满 A**（每个元素都落在某块里）。直观就是切蛋糕：不留缝、不重叠。\n\n<svg viewBox=\"0 0 340 180\" xmlns=\"http://www.w3.org/2000/svg\">\n  <rect x=\"20\" y=\"20\" width=\"300\" height=\"140\" rx=\"18\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.6\"/>\n  <path d=\"M 130 20 C 118 60, 142 120, 124 160\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.2\" stroke-dasharray=\"5,4\"/>\n  <path d=\"M 228 20 C 240 65, 214 115, 232 160\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.2\" stroke-dasharray=\"5,4\"/>\n  <circle cx=\"72\" cy=\"62\" r=\"3.5\" fill=\"#E0612F\"/>\n  <circle cx=\"95\" cy=\"108\" r=\"3.5\" fill=\"#E0612F\"/>\n  <circle cx=\"60\" cy=\"128\" r=\"3.5\" fill=\"#E0612F\"/>\n  <circle cx=\"172\" cy=\"58\" r=\"3.5\" fill=\"#5A5FE0\"/>\n  <circle cx=\"185\" cy=\"116\" r=\"3.5\" fill=\"#5A5FE0\"/>\n  <circle cx=\"278\" cy=\"70\" r=\"3.5\" fill=\"#1F9D6E\"/>\n  <circle cx=\"262\" cy=\"120\" r=\"3.5\" fill=\"#1F9D6E\"/>\n  <circle cx=\"292\" cy=\"132\" r=\"3.5\" fill=\"#1F9D6E\"/>\n  <text x=\"78\" y=\"46\" font-size=\"12\" fill=\"#555\">[a]<\/text>\n  <text x=\"174\" y=\"42\" font-size=\"12\" fill=\"#555\">[b]<\/text>\n  <text x=\"272\" y=\"50\" font-size=\"12\" fill=\"#555\">[c]<\/text>\n  <text x=\"30\" y=\"38\" font-size=\"13\" fill=\"#333\">A<\/text>\n<\/svg>\n\n**定理.** A 上任一等价关系 ~ 的全体等价类，构成 A 的一个划分。\n\n**证明.** 三件事。**非空**：引理 (i)，每个类含自己的代表元。**盖满**：任给 a ∈ A，引理 (i) 说 a ∈ [a]——每个元素都被某个类接住。**两两不相交**：要证任两类要么相等、要么交为空——等价地说，**只要有一个公共成员，两类就整个重合**。这一条留作下面的激活练习（引理 (ii) 已把刀磨好）。∎\n\n反过来也对：给 A 任意一个划分，规定「x ~ y ⟺ x 与 y 落在同一块里」，立刻得到一个等价关系，其等价类恰是原来的那些块。所以**等价关系与划分是同一件事的两种说法**：一个用「关系」的语言，一个用「切块」的语言，信息完全相同。\n\n## 商集：把「视为相同」升格为「真的相同」\n\n最后一步是全节的灵魂。把所有等价类**本身**收成一个新集合：\n\nA / ~ := { [a] : a ∈ A }，\n\n读「A 模 ~」，叫**商集**(quotient set)。\n\n体会一下发生了什么：在 A 里，3 和 17 是两个不同的元素，只是「被视为」相同（同奇偶）；可在商集 ℕ/~ 里，[3] 和 [17] **就是同一个元素**——引理 (ii) 白纸黑字担保了 [3] = [17]。差异没有被假装看不见，而是被**整个打包进类里、再把类当成新的个体**。「视为相同」就此升格为「真的相同」。商集 ℕ/~ 恰有两个元素：{[0], [1]}——它就是「奇偶性」这个概念本身的集合论肉身。\n\n这台机器的威力在于**无中生有地制造新对象**。预告一处你很快会亲眼看到的工地：整数。我们手里将只有自然数，而 3 − 5 在自然数里无家可归；出路是拿有序对 (a, b) 代表「a − b 这个尚不存在的差」，宣布 (3, 5) 与 (4, 6) 这些「差相同」的有序对互相等价，然后——商掉。等价类 [(3,5)] 这个**集合本身**，就是将来那个叫「−2」的对象。ℚ 的造法如出一辙（(1,2) 与 (2,4) 等价……）。每次的套路都一样：先在旧材料上铺一张等价关系，再取商集，新数就诞生了。上一节说的「造出来→验证性质→封装遗忘」，配上这台机器，就是数系构造的全部秘密。\n\n## 一道激活练习\n\n补上定理缺的那块拼图。设 ~ 是 A 上的等价关系，a, b ∈ A。证明：\n\n若 [a] ∩ [b] ≠ ∅，则 [a] = [b]。\n\n（提示：交不空意味着能**取到**一个公共成员 c——这是 ∃ 的用法；然后把 c ∈ [a]、c ∈ [b] 按定义翻译成 ~ 的语句，用对称、传递把 a ~ b 凑出来，最后让引理 (ii) 收口。）\n\n## 参考解答\n\n（建议先自己写完再看。）思路：交不空 → 取见证 c → 翻译成关系语句 → 对称＋传递凑出 a ~ b → 引理 (ii) 一锤定音。\n\n设 [a] ∩ [b] ≠ ∅。按非空的含义，存在 c ∈ [a] ∩ [b]，即 c ∈ [a] 且 c ∈ [b]。按等价类的定义翻译：\n\n```\nc ∈ [a]  即  c ~ a\nc ∈ [b]  即  c ~ b\n```\n\n由 c ~ a 与**对称性**得 a ~ c；又 c ~ b，由**传递性**得 a ~ b。最后由引理 (ii)（a ~ b ⟺ [a] = [b]），得 [a] = [b]。∎\n\n一句话回味：两个类只要碰了一下，就被对称＋传递「焊」成一整块——这正是「不留缝、不重叠」里「不重叠」的来源；而「不留缝」来自自反性（人人都被自己的类接住）。三条纪律，各管划分的一半江山。\n\n## 往前看一步\n\n关系这条线上，我们已经收编了「守纪律的视为相同」。但还有另一种关系，纪律的方向完全不同：不求对称，反倒要求**每个 a 恰好指向一个 b**——不许多指、不许不指。这种「精确制导」的对应，就是整个数学里出镜率最高的角色：<a class=\"wl\" data-id=\"fond_funzioni\">函数<\/a>。","refs":"Amann–Escher, Analysis I §I.4"},{"id":"fond_fondamenta","label":"地基","parent":null,"summary":"整座数学大厦立足之处——逻辑、集合、关系、函数；代数、几何、分析三大主干皆从这里生长。","depth":0,"isContainer":true,"isTop":true,"role":"foundation","color":"#A9A9A9","ring":0,"bearing":3,"popupLinks":[{"id":"fond_insiemi","text":"集合"},{"id":"fond_relazioni","text":"关系"},{"id":"fond_funzioni","text":"函数"}],"body":"\n这里是数学的**地基**(foundation)，整座大厦最底下的一层。它不讲某一个具体的定理，而是把后面一切都要用到的最基本的东西先备齐：一套不含歧义的**语言**（逻辑）、一种描述「一堆对象」的方式（集合）、以及对象之间的**对应与关联**（关系与函数）。\n\n地基自身的根是 逻辑——因为在严格地说清「集合是什么、数是什么、极限是什么」之前，我们必须先有一套精确的语言来陈述命题、组合命题、并判断一段推理成不成立。其余的 <a class=\"wl\" data-id=\"fond_insiemi\">集合<\/a>、<a class=\"wl\" data-id=\"fond_relazioni\">关系<\/a> 与 <a class=\"wl\" data-id=\"fond_funzioni\">函数<\/a>，都站在逻辑之上。\n\n再往上，是代数、几何、分析三大主干：它们各自处理结构、空间与连续，但无论哪一支，写下的每一个定义和定理，归根到底都用这里备好的语言和工具。"},{"id":"fond_funzioni","label":"函数","parent":"fond_fondamenta","summary":"函数是守纪律的关系：定义域里每个元素恰好被指派一个值。f: A→B 连同定义域、到达域、像的区分，是全数学出镜率最高的语言。","depth":1,"isContainer":false,"isTop":false,"role":null,"color":"#A9A9A9","ring":4,"bearing":8,"popupLinks":[{"id":"fond_relazioni","text":"关系"},{"id":"fond_quantificatori","text":"量词"},{"id":"fond_iniettive_suriettive","text":"单射与满射"}],"body":"\n## 从自由到纪律\n\n<a class=\"wl\" data-id=\"fond_relazioni\">关系<\/a>给了我们「对应」，但那是一种完全放任的对应：一个 a 可以指向好几个 b，也可以谁都不指。可数学里最当家的对应是另一种气质——「**给我一个输入，我交还你一个明确的输出**」：给一个数，交还它的平方；给一个三角形，交还它的面积。这里的要害是**确定性**：同一个输入，不许时而这样、时而那样，也不许耸耸肩说「没有输出」。把这条纪律施加到关系上，得到的就是函数。\n\n## 先补一件量词的零件：「恰好一个」\n\n纪律说的是「每个输入**恰好**对应一个输出」——不多（唯一性）、不少（存在性）。「恰好一个」值得有自己的记号。在 <a class=\"wl\" data-id=\"fond_quantificatori\">量词<\/a>的语言里定义：\n\n∃!x P(x)  :⟺  ∃x ( P(x) ∧ ∀y ( P(y) ⟹ y = x ) )，\n\n读「**恰好存在一个** x 使 P(x)」(there exists a unique)。拆开看正是两件事打包：前半个 ∃x P(x) 给**存在**；后半句「凡满足 P 的都等于这个 x」给**唯一**。以后任何「存在且唯一」式的断言（这类定理在数学里是贵族），证明照例分两段：先造一个、再证只此一个。\n\n## 定义\n\n设 A、B 是集合。A 到 B 的一个**函数**(function)（同义词：**映射**(map)），是一个关系 f ⊆ A × B，满足：\n\n∀a ∈ A, ∃!b ∈ B : (a, b) ∈ f。\n\n一句话：A 的每个元素，**恰好**被指派 B 里的一个元素。由于这个 b 被 a 唯一确定，给它专属记号 **f(a)**，叫 f 在 a 处的**值**(value)。整套数据写作\n\nf : A → B，  a ↦ f(a)，\n\n其中 A 叫**定义域**(domain)，B 叫**到达域**(codomain)；箭头 → 连接两个集合，↦ 描述单个元素的去向，两个箭头别混用。\n\n留意我们没有引入任何新本体：函数「就是」一种特殊的关系，而关系「就是」笛卡尔积的子集——一路还原到底，函数是个集合。你熟悉的「函数图像」在这里翻转了身份：**f 不是『有』一个图像，f 本身就是它的图像**——那堆有序对 {(a, f(a)) : a ∈ A} 不是别的，正是 f 自己。\n\n两个函数何时**相等**？数据有三件：定义域、到达域、逐点的值。三件都同才算同：f = g 当且仅当定义域相同、到达域相同，且 ∀a, f(a) = g(a)。前两件不是迂腐——同一条「求平方」规则，配上到达域 ℝ 和配上到达域 [0, ∞)，是**两个不同的函数**；这个区分眼下显得吹毛求疵，到下一节谈「满射」时就是生死线。（ℝ 照例先按熟悉的方式借用，严格构造在后头。）\n\n## 像：到达域里真正被打中的部分\n\n到达域 B 是**宣称**的弹着范围，实际被打中的未必是全部。把真正取到的值收起来：\n\nim f := { f(a) : a ∈ A } ⊆ B，\n\n叫 f 的**像**(image)。例如「求平方」ℝ → ℝ 的像是 [0, ∞)：负数在到达域里坐着，却永远没人打中它。**像 ⊆ 到达域，且一般是真包含**——这两个集合的张力，正是下一节的主角之一。\n\n## 例子与反例\n\n**是函数的：**\n\n- **恒等函数**(identity) id_A : A → A, a ↦ a。最朴素也最重要——以后谈「逆」时它是基准。\n- **常函数**(constant)：取定 c ∈ B，f : A → B, a ↦ c。所有输入打同一个点。「多对一」完全合法——纪律只管「一个输入不许多个输出」，不管「多个输入共用一个输出」。\n- f : ℝ → ℝ, x ↦ x²。每个实数恰有一个平方。\n\n**不是函数的（病各不相同）：**\n\n- R = {(x, y) ∈ ℝ×ℝ : x = y²}，当作 ℝ 到 ℝ 的对应（输入 x、输出 y）。**两种病都犯**：x = −1 时没有任何 y（存在性失败）；x = 4 时 y = 2 和 y = −2 都行（唯一性失败）。\n- 「把每个人对应到他的孩子」：无子女者处存在性失败，多子女者处唯一性失败。日常语言里大量「对应」经不起这两条盘问——这正是函数定义的筛选力。\n\n两幅小图把「合格 / 不合格」一眼定格（左：合格，多对一无妨；右：①一箭双雕、②无箭可发，各犯一病）：\n\n<svg viewBox=\"0 0 460 190\" xmlns=\"http://www.w3.org/2000/svg\">\n  <defs>\n    <marker id=\"arr\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto-start-reverse\">\n      <path d=\"M 0 0 L 10 5 L 0 10 z\" fill=\"#555\"/>\n    <\/marker>\n  <\/defs>\n  <ellipse cx=\"60\" cy=\"95\" rx=\"38\" ry=\"62\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.4\"/>\n  <ellipse cx=\"180\" cy=\"95\" rx=\"34\" ry=\"52\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.4\"/>\n  <text x=\"60\" y=\"24\" font-size=\"13\" text-anchor=\"middle\" fill=\"#333\">A<\/text>\n  <text x=\"180\" y=\"32\" font-size=\"13\" text-anchor=\"middle\" fill=\"#333\">B<\/text>\n  <circle cx=\"60\" cy=\"60\" r=\"3.5\" fill=\"#E0612F\"/><text x=\"46\" y=\"64\" font-size=\"12\" fill=\"#333\">1<\/text>\n  <circle cx=\"60\" cy=\"95\" r=\"3.5\" fill=\"#E0612F\"/><text x=\"46\" y=\"99\" font-size=\"12\" fill=\"#333\">2<\/text>\n  <circle cx=\"60\" cy=\"130\" r=\"3.5\" fill=\"#E0612F\"/><text x=\"46\" y=\"134\" font-size=\"12\" fill=\"#333\">3<\/text>\n  <circle cx=\"180\" cy=\"75\" r=\"3.5\" fill=\"#5A5FE0\"/><text x=\"192\" y=\"79\" font-size=\"12\" fill=\"#333\">a<\/text>\n  <circle cx=\"180\" cy=\"115\" r=\"3.5\" fill=\"#5A5FE0\"/><text x=\"192\" y=\"119\" font-size=\"12\" fill=\"#333\">b<\/text>\n  <line x1=\"66\" y1=\"60\" x2=\"172\" y2=\"74\" stroke=\"#555\" stroke-width=\"1.3\" marker-end=\"url(#arr)\"/>\n  <line x1=\"66\" y1=\"95\" x2=\"172\" y2=\"77\" stroke=\"#555\" stroke-width=\"1.3\" marker-end=\"url(#arr)\"/>\n  <line x1=\"66\" y1=\"130\" x2=\"172\" y2=\"114\" stroke=\"#555\" stroke-width=\"1.3\" marker-end=\"url(#arr)\"/>\n  <text x=\"120\" y=\"178\" font-size=\"12\" text-anchor=\"middle\" fill=\"#1F9D6E\">✓ 函数（多对一无妨）<\/text>\n  <ellipse cx=\"300\" cy=\"95\" rx=\"38\" ry=\"62\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.4\"/>\n  <ellipse cx=\"418\" cy=\"95\" rx=\"34\" ry=\"52\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.4\"/>\n  <circle cx=\"300\" cy=\"60\" r=\"3.5\" fill=\"#E0612F\"/><text x=\"286\" y=\"64\" font-size=\"12\" fill=\"#333\">1<\/text>\n  <circle cx=\"300\" cy=\"95\" r=\"3.5\" fill=\"#E0612F\"/><text x=\"286\" y=\"99\" font-size=\"12\" fill=\"#333\">2<\/text>\n  <circle cx=\"300\" cy=\"130\" r=\"3.5\" fill=\"#E0612F\"/><text x=\"286\" y=\"134\" font-size=\"12\" fill=\"#333\">3<\/text>\n  <circle cx=\"418\" cy=\"75\" r=\"3.5\" fill=\"#5A5FE0\"/><text x=\"430\" y=\"79\" font-size=\"12\" fill=\"#333\">a<\/text>\n  <circle cx=\"418\" cy=\"115\" r=\"3.5\" fill=\"#5A5FE0\"/><text x=\"430\" y=\"119\" font-size=\"12\" fill=\"#333\">b<\/text>\n  <line x1=\"306\" y1=\"60\" x2=\"410\" y2=\"73\" stroke=\"#B33\" stroke-width=\"1.3\" marker-end=\"url(#arr)\"/>\n  <line x1=\"306\" y1=\"62\" x2=\"410\" y2=\"112\" stroke=\"#B33\" stroke-width=\"1.3\" marker-end=\"url(#arr)\"/>\n  <line x1=\"306\" y1=\"130\" x2=\"410\" y2=\"116\" stroke=\"#555\" stroke-width=\"1.3\" marker-end=\"url(#arr)\"/>\n  <text x=\"358\" y=\"178\" font-size=\"12\" text-anchor=\"middle\" fill=\"#B33\">✗ ①两箭 ②无箭<\/text>\n<\/svg>\n\n## 一句要紧的眺望：数学的对象，将批量地「是」函数\n\n定义虽朴素，辐射面大得惊人，先指给你三处：\n\n- **数列**就是函数：一个实数列无非是某个 f : ℕ → ℝ（第 n 项 = f(n)）。将来分析整层楼——极限、级数——的地基语言就是它。\n- **运算**就是函数：加法无非是 + : ℕ×ℕ → ℕ，(a,b) ↦ a+b。代数那一支研究的「带运算的集合」，运算二字的严格身份就是这种函数。\n- 上一节商集工地上还有个隐身角色：把每个元素送到它的等价类，a ↦ [a]，这是个堂堂正正的函数 A → A/~（叫**典范投影**）。以后构造 ℤ 时它会站到台前。\n\n## 一道激活练习\n\nA = {1, 2, 3}，B = {a, b}。下列 A×B 的子集，哪些是 A 到 B 的函数？是的写出 f(1), f(2), f(3) 与像 im f；不是的指明哪一条纪律在哪个元素处失败。\n\n(1) R₁ = {(1,a), (2,a), (3,b)}\n(2) R₂ = {(1,a), (1,b), (2,a), (3,b)}\n(3) R₃ = {(1,a), (3,b)}\n(4) R₄ = {(1,b), (2,b), (3,b)}\n\n（提示：对**每个** a ∈ A 逐一盘问两件事——有没有箭？只有一支吗？）\n\n## 参考解答\n\n（建议先自己写完再看。）思路：定义就是检查清单——∀a ∈ A，先验存在（至少一对 (a, ·)），再验唯一（至多一对）。逐个过堂：\n\n**(1) 是函数。** 1、2、3 各恰好出现一次作第一分量。f(1)=a, f(2)=a, f(3)=b；im R₁ = {a, b}。1 和 2 共用输出 a 完全合法——多对一不犯规。\n\n**(2) 不是。** 元素 1 处**唯一性失败**：(1,a) 与 (1,b) 同时在场，f(1) 无从谈起。（2、3 处都干净也救不了它——纪律是 ∀，一处失守即全盘否决。）\n\n**(3) 不是。** 元素 2 处**存在性失败**：没有任何形如 (2, ·) 的对。它倒是个正经的关系——只是不配叫函数。\n\n**(4) 是函数。** 三个输入各恰好一箭，全打向 b——这是常函数。f(1)=f(2)=f(3)=b；im R₄ = {b}。注意 **im R₄ = {b} ⊊ B**：到达域里 a 没人打中。「像真包含于到达域」在这里第一次具体现身。\n\n回味一句：(2) 和 (3) 病灶相反——一个箭太多、一个箭太少——恰好对应 ∃! 里打包的两半（∃ 与唯一性）。检查任何「对应」是不是函数，永远是这两问。\n\n## 往前看一步\n\n至此地基的四件套——逻辑、集合、关系、函数——全部到位。而函数自己的故事才刚开头：(4) 里那种「到达域没被打满」的函数，与「多对一」的函数，分别欠缺两种宝贵的品质；两种品质凑齐的函数，能把两个集合「完美配对」，进而让我们第一次能严格地谈论「这两个集合一样多」——哪怕它们都是无穷的。这就是接下来 <a class=\"wl\" data-id=\"fond_iniettive_suriettive\">单射与满射<\/a> 的戏。","refs":"Amann–Escher, Analysis I §I.3"},{"id":"fond_iniettive_suriettive","label":"单射、满射与双射","parent":"fond_fondamenta","summary":"单射不许两个输入共用输出，满射要求到达域全被打中；二者兼备即双射——能把两个集合完美配对，是「一样多」的严格化前奏。","depth":1,"isContainer":false,"isTop":false,"role":null,"color":"#A9A9A9","ring":5,"bearing":6,"popupLinks":[{"id":"fond_proposizioni","text":"逆否"},{"id":"fond_quantificatori","text":"存在命题"},{"id":"fond_composizione","text":"复合与逆函数"}],"body":"\n## 两种缺憾，两种品质\n\n上一节末尾验明：函数的纪律只管「一个输入恰好一支箭」，并不禁止两件事——**几个输入共用一个靶点**（常函数是极端），以及**到达域里有靶点无人问津**（im f ⊊ B）。这两件事不犯规，却各是一种缺憾：前者意味着从输出**回推不出**输入是谁；后者意味着到达域**虚报**了弹着范围。把这两个缺憾分别堵上，就得到函数的两种品质；两种全占的函数，将做到一件了不起的事——在两个集合之间**完美配对**。\n\n## 单射：输出认得出输入\n\nf : A → B 是**单射**(injective)，若不同输入必得不同输出。直接写就是 ∀x, x′ ∈ A ( x ≠ x′ ⟹ f(x) ≠ f(x′) )。但实际干活时，几乎总用它的<a class=\"wl\" data-id=\"fond_proposizioni\">逆否<\/a>形式：\n\n∀x, x′ ∈ A ( f(x) = f(x′) ⟹ x = x′ )。\n\n两种说法逻辑等价（逆否命题与原命题同真假——第一节已证的事实），但**好用程度天差地别**：原始形式叫你从「x ≠ x′」这种否定信息出发去推另一个否定——不等式没法代入、没法消去，无从下手；逆否形式给你一个**等式** f(x) = f(x′) 当起点——等式可以两边同加同乘、层层剥洋葱。于是**证单射的标准开场白**永远是：「设 f(x) = f(x′)，往证 x = x′」。\n\n单射也叫「一对一」(one-to-one)——每个被打中的靶点恰被一支箭打中，从输出能**唯一回溯**输入。\n\n## 满射：到达域不掺水\n\nf : A → B 是**满射**(surjective)，若到达域里每个元素都真的被打中：\n\n∀b ∈ B, ∃a ∈ A : f(a) = b。\n\n等价说法：im f = B——「像」与「到达域」这对上一节区分的概念在此合龙。满射也叫「映上」(onto)。\n\n证明的形状由定义里的 ∀∃ 决定：**任给** b ∈ B，要**找出**（造出）一个 a 使 f(a) = b——这是<a class=\"wl\" data-id=\"fond_quantificatori\">存在命题<\/a>，给出见证即可，通常就是「解方程 f(a) = b，把 a 用 b 表示出来，再代回验证」。\n\n立刻看清一件事：**满射与否，根本不是 f 的「规则」单方面能决定的——它由规则与到达域共同决定**。同一条规则，到达域写大一号就不满，裁齐了就满。这正是上一节坚持「到达域是函数身份的一部分」的落实。\n\n## 一条规则，四种身份\n\n把这层意思推到极致。看「求平方」这一条规则，配四种(定义域, 到达域)：\n\n| | 函数 | 单射? | 满射? | 病灶 / 解法 |\n|---|---|---|---|---|\n| ① | ℝ → ℝ, x ↦ x² | 否 | 否 | f(−1)=f(1)=1 杀单射；−1 无人打中杀满射 |\n| ② | [0,∞) → ℝ, x ↦ x² | 是 | 否 | 砍掉负半轴，「±x 同平方」的病根除了；但 −1 仍空置 |\n| ③ | ℝ → [0,∞), x ↦ x² | 否 | 是 | 到达域裁齐成像；可 ±1 仍共用靶点 |\n| ④ | [0,∞) → [0,∞), x ↦ x² | 是 | 是 | 两病齐除：双射 |\n\n**同一条规则，四个不同的函数，四种身份。** 若你还记得上一节「函数 = 定义域 + 到达域 + 逐点的值，三件套」，这张表就是那句话最响亮的回声：定义域与到达域不是函数的包装纸，是它的骨肉。\n\n> 表里有句话先按下没问：④ 凭什么是满射？任给 b ≥ 0，得找 a ≥ 0 使 a² = b——也就是说**每个非负实数都得有平方根**。这件事看着天经地义，实则深不见底：它依赖 ℝ「没有缝隙」的完备性，是分析那一支的核心地基。此处暂且承认，严格证明留待实数完备性。你看，连 √2 的存在，也要等一条定理来确立——这正是我们整套从头重建的意义所在。\n\n两幅小图把 ②、③ 的气质画出来（左：箭箭分明、却有靶点空置；右：靶点全中、却有共用）：\n\n<svg viewBox=\"0 0 460 200\" xmlns=\"http://www.w3.org/2000/svg\">\n  <defs>\n    <marker id=\"arr2\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto-start-reverse\">\n      <path d=\"M 0 0 L 10 5 L 0 10 z\" fill=\"#555\"/>\n    <\/marker>\n  <\/defs>\n  <ellipse cx=\"60\" cy=\"100\" rx=\"36\" ry=\"56\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.4\"/>\n  <ellipse cx=\"178\" cy=\"100\" rx=\"36\" ry=\"66\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.4\"/>\n  <circle cx=\"60\" cy=\"68\" r=\"3.5\" fill=\"#E0612F\"/>\n  <circle cx=\"60\" cy=\"100\" r=\"3.5\" fill=\"#E0612F\"/>\n  <circle cx=\"60\" cy=\"132\" r=\"3.5\" fill=\"#E0612F\"/>\n  <circle cx=\"178\" cy=\"58\" r=\"3.5\" fill=\"#5A5FE0\"/>\n  <circle cx=\"178\" cy=\"86\" r=\"3.5\" fill=\"#5A5FE0\"/>\n  <circle cx=\"178\" cy=\"114\" r=\"3.5\" fill=\"#5A5FE0\"/>\n  <circle cx=\"178\" cy=\"142\" r=\"3.5\" fill=\"none\" stroke=\"#5A5FE0\" stroke-width=\"1.4\" stroke-dasharray=\"3,2\"/>\n  <line x1=\"66\" y1=\"68\" x2=\"170\" y2=\"59\" stroke=\"#555\" stroke-width=\"1.3\" marker-end=\"url(#arr2)\"/>\n  <line x1=\"66\" y1=\"100\" x2=\"170\" y2=\"87\" stroke=\"#555\" stroke-width=\"1.3\" marker-end=\"url(#arr2)\"/>\n  <line x1=\"66\" y1=\"132\" x2=\"170\" y2=\"115\" stroke=\"#555\" stroke-width=\"1.3\" marker-end=\"url(#arr2)\"/>\n  <text x=\"118\" y=\"188\" font-size=\"12\" text-anchor=\"middle\" fill=\"#333\">单射、非满射（虚圈空置）<\/text>\n  <ellipse cx=\"300\" cy=\"100\" rx=\"36\" ry=\"62\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.4\"/>\n  <ellipse cx=\"416\" cy=\"100\" rx=\"34\" ry=\"48\" fill=\"none\" stroke=\"#888\" stroke-width=\"1.4\"/>\n  <circle cx=\"300\" cy=\"62\" r=\"3.5\" fill=\"#E0612F\"/>\n  <circle cx=\"300\" cy=\"100\" r=\"3.5\" fill=\"#E0612F\"/>\n  <circle cx=\"300\" cy=\"138\" r=\"3.5\" fill=\"#E0612F\"/>\n  <circle cx=\"416\" cy=\"80\" r=\"3.5\" fill=\"#5A5FE0\"/>\n  <circle cx=\"416\" cy=\"122\" r=\"3.5\" fill=\"#5A5FE0\"/>\n  <line x1=\"306\" y1=\"62\" x2=\"408\" y2=\"79\" stroke=\"#555\" stroke-width=\"1.3\" marker-end=\"url(#arr2)\"/>\n  <line x1=\"306\" y1=\"100\" x2=\"408\" y2=\"82\" stroke=\"#555\" stroke-width=\"1.3\" marker-end=\"url(#arr2)\"/>\n  <line x1=\"306\" y1=\"138\" x2=\"408\" y2=\"121\" stroke=\"#555\" stroke-width=\"1.3\" marker-end=\"url(#arr2)\"/>\n  <text x=\"358\" y=\"188\" font-size=\"12\" text-anchor=\"middle\" fill=\"#333\">满射、非单射（两箭共靶）<\/text>\n<\/svg>\n\n## 双射\n\nf : A → B 既单又满，就叫**双射**(bijective)（同义：**一一对应**(one-to-one correspondence)）。把两个定义并排读出它的画像：B 里每个元素**至少**被打中一次（满射）、**至多**被打中一次（单射）——所以**恰好一次**。A 的元素与 B 的元素经由 f 两两牵手、无一落单、无一脚踏两船：完美配对。又见「至少 + 至多 = 恰好」——和定义函数时的 ∃! 是同一个句式，只是这回盘问的方向反了过来：那时问「每个输入恰好几支箭**射出**」，现在问「每个靶点恰好几支箭**射入**」。\n\n## 标准证明套路，跑一遍全程\n\n拿 f : ℝ → ℝ, x ↦ 2x + 1 当靶子（ℝ 及其四则照例先借用），把两种证明的标准姿势各演一遍。\n\n**单射**：设 f(x) = f(x′)，即 2x + 1 = 2x′ + 1。两边减 1 得 2x = 2x′，两边除以 2 得 x = x′。∎ （从等式出发、代数消去——逆否形式的好处全在这几步里。）\n\n**满射**：任给 b ∈ ℝ，要找 a 使 2a + 1 = b。解出候选 a = (b−1)/2——它是个实数，资格合法；代回验证：f(a) = 2·(b−1)/2 + 1 = (b−1) + 1 = b。∎ （先解出见证、再代回验证，两步缺一不可：解出来的东西必须确认真在定义域里、真打中 b。）\n\n故 f 是双射。\n\n## 否定形式：量词练兵场\n\n实战里「证明 f **不是**单射/满射」与证明「是」一样常见，所以把两个定义的否定推到底（<a class=\"wl\" data-id=\"fond_quantificatori\">量词<\/a>那一节的否定规则正好上岗——∀∃ 对调、谓词取反）：\n\n**非单射**：¬∀x,x′ ( f(x)=f(x′) ⟹ x=x′ ) ≡ ∃x,x′ ( f(x)=f(x′) ∧ x≠x′ )。（蕴含的否定 = 前件真而后件假——回想 p⟹q ≡ ¬p∨q，取反得 p∧¬q。）一句话：**找一对撞车的见证**。\n\n**非满射**：¬∀b∃a f(a)=b ≡ ∃b ∀a f(a)≠b。一句话：**找一个无人能打中的靶点**——注意这后半截是个 ∀，光说「我没找到谁打中它」不够，得**论证所有** a 都打不中。\n\n两条否定都把「证伪」变成了找见证的活——但难度不对称：非单射只需亮出两个具体的 x；非满射的见证 b 后面还拖着一条要论证的 ∀。下面练习里你会亲身体会这条不对称。\n\n## 一道激活练习\n\n用上面的否定形式，证明 ① 号函数 f : ℝ → ℝ, x ↦ x² **既非单射、也非满射**。要求：每条都先写出要证的量词语句，再给出见证并完成论证。\n\n（提示：非满射那条，选定靶点 b 后，剩下的「∀a, a² ≠ b」是个全称命题——它需要一个对**所有**实数成立的理由，想想平方有什么对所有实数都成立的性质。）\n\n## 参考解答\n\n（建议先自己写完再看。）\n\n**非单射**：要证 ∃x,x′ ( x² = x′² ∧ x ≠ x′ )。取见证 x = 1, x′ = −1：1² = 1 = (−1)²，而 1 ≠ −1。两个条件都验毕。∎\n\n**非满射**：要证 ∃b ∀a ( a² ≠ b )。取见证 b = −1，往证 ∀a ∈ ℝ, a² ≠ −1。这一步不能靠「试了几个都不行」，要一个普适的理由：任何实数的平方非负（a ≥ 0 与 a < 0 两种情形下 a·a 都 ≥ 0——此处暂且承认这条关于 ℝ 序与乘法的事实，它的严格出处是有序域的公理，留待数系构造），故 a² ≥ 0 > −1，从而 a² ≠ −1，对一切 a 成立。∎\n\n回味两口：其一，两个证明的「劳动量」印证了正文里说的不对称——非单射亮出两个数就收工，非满射在见证之后还得打一场 ∀ 的硬仗。其二，留意「平方非负」也未被当作显然——它将由有序域的公理严格给出。这套体系里没有「显然」，只有「已证」和「待证」。\n\n## 往前看一步\n\n双射给了我们完美配对。配对天然让人想做一件事：**沿着箭头走回去**——既然 B 的每个元素恰好被一支箭打中，那「从 b 回到打中它的那个 a」本身岂不也是一个函数？这个直觉是对的，但要把它说严格，先得有「把两个函数接力起来」的操作。函数的复合、以及「双射恰好就是可逆的函数」这条定理，是接下来 <a class=\"wl\" data-id=\"fond_composizione\">复合与逆函数<\/a> 的正题。","refs":"Amann–Escher, Analysis I §I.3"},{"id":"fond_insiemi","label":"集合","parent":"fond_fondamenta","summary":"集合是把一些对象当作整体来看待；∈ 是原始的属于关系，外延原则用「成员相同」定义相等，而 ∪∩∖ 不过是 ∨∧¬ 抬到 ∈ 上。","depth":1,"isContainer":false,"isTop":false,"role":null,"color":"#A9A9A9","ring":2,"bearing":11,"popupLinks":[{"id":"fond_quantificatori","text":"谓词"},{"id":"fond_proposizioni","text":"联结词"},{"id":"fond_relazioni","text":"关系"}],"body":"\n## 为什么需要集合\n\n上一节的量词总要「取遍某个范围」——∀x、∃x 里那个 x 究竟在哪儿取？我们一直含糊地说「论域」「一堆对象」。现在把这个范围本身钉死：它就是**集合**。集合是数学里**最通用的容器**——往后每一个对象（数、函数、空间里的点）都将被装进某个集合里来谈。\n\n## 集合与属于\n\n**集合**(set) 就是把若干对象看作一个整体；这些对象叫它的**元素**(element)。最根本的关系是**属于**(membership)，记 x ∈ A，读作「x 是 A 的元素」；不属于记 x ∉ A。\n\n属于关系 ∈ 我们**不再往下定义**——它和逻辑一样，是这一层的原始概念，我们约定直接使用。（这是个选择：整个集合论就架在 ∈ 这一个原始关系之上。）\n\n怎么写出一个具体的集合？两种办法：\n\n- **列举**：把元素列出来，如 A = {0, 1, 2}。花括号里不计次序、不计重复——{0,1,2}、{2,1,0}、{0,0,1,2} 是同一个集合（凭什么算「同一个」，下面外延原则会讲死）。\n- **描述**：从一个**已有的**集合 A 里，挑出满足某谓词 P(x) 的元素，记 {x ∈ A : P(x)}。这里直接用上了上一节的 <a class=\"wl\" data-id=\"fond_quantificatori\">谓词<\/a>——例如 {x ∈ ℝ : x > 3}。\n\n> 留意「从已有集合里挑」这个限制：不能无中生有地写 {x : P(x)}（对「一切满足 P 的 x」一网打尽）。这种不加约束的写法会闹出矛盾（罗素悖论），严格的回避之道留待后面专门处理；眼下我们一律**从一个已经到手的集合里切**，就安全了。\n\n## 外延原则：集合由成员决定\n\n两个集合什么时候**相等**？回答只有一条——**外延原则**(extensionality)：两个集合相等，当且仅当它们含有完全相同的元素。用我们已有的逻辑语言写出来，干净利落：\n\nA = B  ⟺  ∀x ( x ∈ A ⟺ x ∈ B )。\n\n这条把「相等」彻底交给了「成员」：集合**不在乎**元素怎么排、写了几遍、用什么方式描述出来——只认「谁在里面」。这就是为什么 {0,1,2} 和 {2,1,0} 是同一个集合。\n\n## 子集\n\n若 A 的每个元素都还在 B 里，就说 A 是 B 的**子集**(subset)，记 A ⊆ B。又是用 ∀ 和蕴含直接拼出来：\n\nA ⊆ B  ⟺  ∀x ( x ∈ A ⟹ x ∈ B )。\n\n把它和外延原则并到一处，得到一条天天要用的「双向夹」：\n\nA = B  ⟺  ( A ⊆ B  ∧  B ⊆ A )。\n\n（因为前面讲联结词时说过 p ⟺ q 恰是 (p⟹q)∧(q⟹p)，把它套到 x∈A ⟺ x∈B 上即得。）所以证集合相等的标准套路就是：**证 A⊆B、再证 B⊆A**，两个方向各跑一遍——你以后会无数次这么做。\n\n## 基本运算就是联结词\n\n这是本节最漂亮的一点：集合的交、并、差，**根本不是新东西**——它们就是讲联结词那节的 <a class=\"wl\" data-id=\"fond_proposizioni\">联结词<\/a> ∧、∨、¬，被「抬」到属于关系 ∈ 上：\n\n- **并**(union)：x ∈ A ∪ B  ⟺  x ∈ A  ∨  x ∈ B。\n- **交**(intersection)：x ∈ A ∩ B  ⟺  x ∈ A  ∧  x ∈ B。\n- **差**(difference)：x ∈ A ∖ B  ⟺  x ∈ A  ∧  ¬(x ∈ B)。\n\n先用一张图把直觉立起来——两个圆，交叠处即 A∩B，两圆覆盖的全部即 A∪B：\n\n<svg viewBox=\"0 0 360 200\" xmlns=\"http://www.w3.org/2000/svg\">\n  <circle cx=\"140\" cy=\"100\" r=\"78\" fill=\"#FF7F50\" fill-opacity=\"0.20\" stroke=\"#E0612F\" stroke-width=\"1.6\"/>\n  <circle cx=\"220\" cy=\"100\" r=\"78\" fill=\"#979AFF\" fill-opacity=\"0.20\" stroke=\"#5A5FE0\" stroke-width=\"1.6\"/>\n  <text x=\"92\" y=\"106\" font-size=\"20\" text-anchor=\"middle\" fill=\"#333\">A<\/text>\n  <text x=\"268\" y=\"106\" font-size=\"20\" text-anchor=\"middle\" fill=\"#333\">B<\/text>\n  <text x=\"180\" y=\"105\" font-size=\"13\" text-anchor=\"middle\" fill=\"#333\">A∩B<\/text>\n<\/svg>\n\n一旦「成员资格」被翻译成逻辑命题，集合的恒等式就**全部塌缩成上面那些逻辑等价**。举个例子，集合版的德摩根律 A∖(B∪C) = (A∖B)∩(A∖C)，证起来无非是把 ∈ 翻成逻辑、套一次逻辑的德摩根、再用外延原则收口。这就是套路：**集合代数 = 逻辑代数，根都在 ∈ 和那张真值表里**。\n\n## 空集\n\n有一个集合一个元素都没有，叫**空集**(empty set)，记 ∅。它有个初看古怪的性质：**∅ 是任何集合的子集**，即 ∅ ⊆ A 对一切 A 成立。\n\n为什么？按定义，∅ ⊆ A 就是 ∀x ( x ∈ ∅ ⟹ x ∈ A )。可 x ∈ ∅ 永远为假，于是这个蕴含的前件恒假——它**空洞地为真**（正是讲蕴含时「前件为假，蕴含自动成立」那一条）。前件从不成立，承诺就从不被推翻，所以 ∅ ⊆ A 自动成立。逻辑那一层埋下的种子，在这里结了第一个果。\n\n## 一道激活练习\n\n用**外延原则**证明交运算可交换：\n\nA ∩ B = B ∩ A。\n\n（思路提示：要证两集合相等，按外延原则只需证 ∀x ( x∈A∩B ⟺ x∈B∩A )；把两边的 ∈ 都翻成逻辑，你会发现它归结为前面某条关于 ∧ 的等价。）\n\n## 参考解答\n\n（建议先自己写完再看。）思路：集合相等 → 外延原则 → 把成员资格翻成逻辑 → 套一条逻辑等价 → 收口。\n\n由外延原则，要证 A∩B = B∩A，只需对任意 x 证 x∈A∩B ⟺ x∈B∩A。逐步：\n\n```\n  x ∈ A∩B\n⟺ x∈A ∧ x∈B       （交的定义）\n⟺ x∈B ∧ x∈A       （∧ 的交换律——用真值表一眼可验：p∧q 与 q∧p 两列相同）\n⟺ x ∈ B∩A         （交的定义，反着用）\n```\n\n对一切 x 成立，故由外延原则 A∩B = B∩A。∎\n\n一句话思路：**集合的「交换律」其实是「且」的交换律换了身衣服**——这正是「集合代数 = 逻辑代数」的一个实例。同样地，集合的德摩根律、分配律，根也都在前面那些逻辑等价里。\n\n## 往前看一步\n\n现在我们有了容器（集合），也能判断相等、包含，做交并差了。但眼下集合里的元素还各自孤立；数学真正关心的，是元素之间的**对应**——把 A 里的东西按某种规则关联到 B 里的东西。要精确地谈「对应」，得先有一个能装下「一对有次序的对象」的工具，再从中提炼出**关系**与函数。这就引向接下来的 <a class=\"wl\" data-id=\"fond_relazioni\">关系<\/a>。","refs":"Amann–Escher, Analysis I §I.2"},{"id":"fond_proposizioni","label":"命题与联结词","parent":"fond_fondamenta","summary":"命题是非真即假的陈述；五个联结词 ¬ ∧ ∨ ⟹ ⟺ 全部由真值表定义，是一切数学推理的最小零件。","depth":1,"isContainer":false,"isTop":false,"role":null,"color":"#A9A9A9","ring":0,"bearing":13,"popupLinks":[{"id":"fond_quantificatori","text":"谓词与量词"}],"body":"\n## 为什么从这里起步\n\n我们要从零开始，一砖一瓦把整座数学大厦盖起来。立的规矩是：**任何一句断言，都必须能往下追溯到它所依赖的、更基本的断言**。可这样一路下追总得有尽头——总有一层东西，是我们**约定直接接受、不再往下追问**的。逻辑，就是这最底下的一层。所以这一节脚下空无一物，它本身就是基岩：我们在这里一次性说清「什么才算一句数学的话」「这些话怎么拼接」，之后所有的定义、定理与证明，用的都是这套语言。\n\n## 命题\n\n**命题(proposition)** 是一个**非真即假**的陈述句。「非真即假」四个字要拆开看，含两层意思：它要么真、要么假（**至少**居其一），且不能又真又假（**至多**居其一）。我们把「真」记作 **T**(true)、「假」记作 **F**(false)，统称命题的**真值(truth value)**。\n\n> 这里其实悄悄做了一个**选择**：我们约定采用**经典二值逻辑**——每个命题的真值恰好是 T、F 之一，「排中律」（要么 p、要么非 p，没有第三种可能）默认成立。这是一个立场，而非天经地义；逻辑学里还有不认排中律的体系（如直觉主义逻辑）。但经典逻辑是分析学通行的地基，我们就站在这块地基上。\n\n判断几个句子是不是命题，能帮你抓住要点：\n\n- 「2 是素数(prime)」—— 是命题，真值为 T。\n- 「13 能被 5 整除」—— 是命题，真值为 F。\n- 「请关上门」—— 不是命题（祈使句，无所谓真假）。\n- 「x > 3」—— **暂时**不是命题：真假取决于 x 是谁。这种「含未定元、给定取值后才有真假」的句子叫**谓词**，它要等到 <a class=\"wl\" data-id=\"fond_quantificatori\">谓词与量词<\/a> 才登场——这正是下一节的事。\n- 「这句话是假的」—— 不是命题（说谎者悖论：假设它真，则推出它假；假设它假，又推出它真。它落不进 T/F 任何一格）。\n\n记住这条线：**命题必须能干净地落进 T 或 F 一格**。落不进的，现在都不算。\n\n## 五个联结词\n\n光有一句句孤立的命题还不够用；数学里的话总是「且」「或」「如果……那么」地缠在一起。我们用**联结词(connective)** 把已有命题拼成新命题。要紧的有五个，而它们的全部含义，**就是各自的真值表**——不多不少。换句话说，联结词不靠「语感」定义，靠真值表定义；语感只是帮你记忆的拐杖。\n\n设 p、q 是命题。\n\n**否定(negation) ¬p**：「并非 p」。\n\n| p | ¬p |\n|---|----|\n| T | F |\n| F | T |\n\n**合取(conjunction) p ∧ q**：「p 且 q」。唯有两者皆真才真。\n\n| p | q | p ∧ q |\n|---|---|-------|\n| T | T | T |\n| T | F | F |\n| F | T | F |\n| F | F | F |\n\n**析取(disjunction) p ∨ q**：「p 或 q」。这里的「或」是**相容或(inclusive or)**——只要至少一个真就真，包括两个都真的情形。日常说「喝茶或喝咖啡」常暗指二选一，但数学的 ∨ **不**排斥「两个都要」。\n\n| p | q | p ∨ q |\n|---|---|-------|\n| T | T | T |\n| T | F | T |\n| F | T | T |\n| F | F | F |\n\n**蕴含(implication) p ⟹ q**：「如果 p，那么 q」。p 叫**前件**、q 叫**后件**。它的真值表是五个里最反直觉的一处，务必盯住：\n\n| p | q | p ⟹ q |\n|---|---|-------|\n| T | T | T |\n| T | F | F |\n| F | T | T |\n| F | F | T |\n\n要点：**p ⟹ q 唯一为假的情形，是「前件真、后件假」**。前件一旦为假，整个蕴含**自动为真**——这叫**空洞为真(vacuously true)**。初学最别扭的就是后两行：「F ⟹ 任何」都判真。打个比方：你许诺「**如果**明天下雨，我**就**带伞」。只有「下了雨、你却没带伞」才算你食言（对应第二行）。若明天压根没下雨，那无论你带没带伞，你的承诺都没被推翻——承诺自动算数。数学约定取的正是这个判法：它让「前提不成立时陈述不算错」，从而使蕴含能顺畅地参与推理。\n\n**等价(equivalence) p ⟺ q**：「p 当且仅当(if and only if) q」，两者真值一致才真。\n\n| p | q | p ⟺ q |\n|---|---|-------|\n| T | T | T |\n| T | F | F |\n| F | T | F |\n| F | F | T |\n\n不难看出 p ⟺ q 恰好是 (p ⟹ q) ∧ (q ⟹ p)——这也是为何证明「等价」常拆成「⟹」与「⟸」两个方向各证一遍，你以后会无数次这么做。\n\n## 复合命题与真值表的用法\n\n有了五个零件，就能拼任意复杂的式子，如 ¬(p ∧ q) 或 (p ⟹ q) ∧ (¬q)。**任何**这样的复合命题，它的真值都被组成它的那些命题的真值**唯一决定**——一行行算真值表即可。约定优先级（像算术里乘除先于加减）：¬ 最紧，其次 ∧、∨，再次 ⟹、⟺；拿不准就加括号，括号永远优先。\n\n举一例，算 ¬p ∨ q 的真值表，并和 p ⟹ q 并排放：\n\n| p | q | ¬p | ¬p ∨ q | p ⟹ q |\n|---|---|----|--------|-------|\n| T | T | F | T | T |\n| T | F | F | F | F |\n| F | T | T | T | T |\n| F | F | T | T | T |\n\n最后两列一模一样。这告诉我们：**蕴含并不是第六个独立的零件**，p ⟹ q 不过是 ¬p ∨ q 的简写。这是我们第一次用真值表「证明」了两个外形不同的式子其实是同一个东西。\n\n当一个复合命题在**所有**真值组合下都为 T，称它为**重言式(tautology)**，即「永真式」；恒为 F 的称**矛盾式(contradiction)**。重言式是逻辑里「无条件成立」的真理，是日后一切推理规则的来源。\n\n## 几条要紧的等价\n\n若 A、B 两个式子真值表完全相同，就记 A ≡ B，说它们**逻辑等价**（等价的说法：A ⟺ B 是重言式）。下面几条最常用，每条都能用真值表验证：\n\n- **双重否定**：¬¬p ≡ p。\n- **德摩根律(De Morgan's laws)**：¬(p ∧ q) ≡ ¬p ∨ ¬q，且 ¬(p ∨ q) ≡ ¬p ∧ ¬q。「否定一个『且』，得到『或』；否定一个『或』，得到『且』」——否定往里钻时，∧ 与 ∨ 互换。这条以后求「极限不存在」「函数不连续」之类否定命题时天天要用。\n- **蕴含的改写**：p ⟹ q ≡ ¬p ∨ q（刚验过）。\n- **逆否命题(contrapositive)**：p ⟹ q ≡ ¬q ⟹ ¬p。一个蕴含和它的逆否式永远同真假——这是「反证法」成立的逻辑根。注意它跟**逆命题(converse)** q ⟹ p 是两码事，后者一般**不**与原命题等价（见下条陷阱）。\n\n## 几个最容易栽跟头的地方\n\n- **相容或 vs 排斥或**：∨ 是相容或，「两个都真」也算真。真要表达「恰好二选一」，得另写 (p ∨ q) ∧ ¬(p ∧ q)。\n- **空洞为真**：F ⟹ q 恒真。「所有独角兽都会飞」这种话，因前提（存在独角兽）为假而**自动**为真——别被它荒谬的外表骗了。这一点到了带量词的命题里会再次绊人，先留个心。\n- **逆命题不是原命题**：由「下雨 ⟹ 地湿」推不出「地湿 ⟹ 下雨」（洒水车也能让地湿）。能与原命题对调的，只有逆否命题 ¬q ⟹ ¬p，不是逆命题。这是初学证明最高频的逻辑漏洞。\n- **联结词 ⟹ 与「推理」不是一回事**：⟹ 是个**造句**用的真值函数，吃两个命题、吐一个命题；而我们写证明时说的「由 A 推出 B」是一种**元层面**的判断（在所有使 A 真的情形下 B 也真）。二者高度相关却不同层。本课程按通行做法，在这套「严谨但不完全形式化」的数学元语言里工作，不另起炉灶搭一套形式证明系统；真正的形式证明论是逻辑学独立的一支，我们用不到时就不去碰它。\n\n## 一道激活练习\n\n用真值表证明**德摩根律的第一条**：\n\n¬(p ∧ q) ≡ ¬p ∨ ¬q。\n\n也就是列出 p、q 的四种组合，分别算出左边 ¬(p ∧ q) 与右边 ¬p ∨ ¬q 两列，核对它们逐行相等。（提示：先算辅助列 p ∧ q 和 ¬p、¬q，再拼出两边。）做完后请用一句自己的话，说清「否定一个合取，为什么会翻成析取」。\n\n## 参考解答\n\n（建议先自己写完再看。）思路：联结词全由真值表定义，所以「证明两式等价」＝「列出全部真值组合，逐行核对两边真值相同」。\n\n| p | q | p∧q | ¬(p∧q) | ¬p | ¬q | ¬p∨¬q |\n|---|---|-----|--------|----|----|-------|\n| T | T | T | F | F | F | F |\n| T | F | F | T | F | T | T |\n| F | T | F | T | T | F | T |\n| F | F | F | T | T | T | T |\n\n第 4 列 ¬(p∧q) 与第 7 列 ¬p∨¬q 逐行相同 → 两式逻辑等价。\n\n为什么「且」的否定会翻成「或」：要让「p 且 q」不成立，**不必两个都假**，只要**至少一个**假，整个合取就塌了——而「至少一个为假」正是「¬p 或 ¬q」。否定一个合取，约束被放松成了析取。\n\n## 往前看一步\n\n到这里，我们能精确地谈论一句句**确定的**断言，并把它们拼装、化简、互相推出。可数学里铺天盖地的句子其实长这样：「**对每一个**实数 x，x² ≥ 0」「**存在**某个 n，使得……」——它们带着未定的元、扫过一整个范围。这种句子还不是我们今天定义的命题（回想那个被搁置的「x > 3」）。要把它们也纳入这套严密的语言，就得给逻辑添上两件新工具：**全称**与**存在**。这正是 <a class=\"wl\" data-id=\"fond_quantificatori\">谓词与量词<\/a> 要做的事。","refs":"Amann–Escher, Analysis I §I.1"},{"id":"fond_quantificatori","label":"谓词与量词","parent":"fond_fondamenta","summary":"谓词是带未定元的「开句」，给定取值才有真假；全称 ∀ 与存在 ∃ 把它封成命题，其否定是德摩根律的放大版，是数学陈述的标准句式。","depth":1,"isContainer":false,"isTop":false,"role":null,"color":"#A9A9A9","ring":1,"bearing":12,"popupLinks":[{"id":"fond_proposizioni","text":"德摩根律"},{"id":"fond_insiemi","text":"集合"}],"body":"\n## 为什么需要量词\n\n上一节我们把「命题」定得很严：一句话必须能干净地落进真或假。也正因如此，我们当时把「x > 3」这类句子**挡在了门外**——它的真假悬而未决，要看 x 是谁。可偏偏，数学里最常说的话恰恰长这样：「**对每一个**实数 x，都有 x² ≥ 0」「**存在**一个 n，使得 2ⁿ > 1000」。这些句子扫过一整个范围，是定理与定义的标准句式。这一节就把它们正式收进我们严密的语言里——办法分两步：先承认带未定元的「开句」，再用两个**量词**把它们封成真正的命题。\n\n## 谓词\n\n**谓词**(predicate)，也叫**开语句**(open sentence)，是一句含有**自由变元**(free variable)的话，记作 P(x)；它本身**没有**真值，但一旦把 x 代成某个具体对象，就变回一个命题。\n\n- 取 P(x)：「x > 3」，变元 x 取遍实数。那么 P(5) 为真、P(2) 为假；而 P(x) 孤零零地写着，无所谓真假。\n- 谓词可以带多个变元：Q(x, y)：「x < y」，代入 Q(1, 2) 真、Q(2, 1) 假。\n\n有一点必须讲清：写谓词，**一定要交代变元的取值范围**——这个范围叫**论域**(domain of discourse)。「x > 3」在论域为 ℝ 时，和在论域为「正整数」时，谈的是不同的事。（这个「范围」严格来说是一个集合；集合的严格定义我们下节再给，这里先借用「一堆对象凑成一个整体」的朴素理解。）\n\n## 两个量词\n\n要把开句 P(x) 封成一个有真假的命题，就给变元**加上量词**、把它「绑定」住。要紧的只有两个。\n\n**全称量词**(universal quantifier) ∀。写 ∀x ∈ A, P(x)，读作「对论域 A 里的**每一个** x，P(x) 成立」。它为真，当且仅当 P(x) 对 A 中**所有** x 都为真。\n\n- ∀x ∈ ℝ, x² ≥ 0：真。\n- ∀x ∈ ℝ, x > 3：假——因为有 x = 0 不满足。\n\n记住要害：**要推翻一个全称命题，只需举出一个反例**(counterexample)。哪怕千万个 x 都对，只要逮着一个不对的，∀ 就塌了。\n\n**存在量词**(existential quantifier) ∃。写 ∃x ∈ A, P(x)，读作「在 A 里**存在**某个 x，使 P(x) 成立」。它为真，当且仅当 P(x) 对 A 中**至少一个** x 为真。\n\n- ∃x ∈ ℝ, x > 3：真——拿出 x = 5 作见证即可。\n- ∃x ∈ ℝ, x² < 0：假——没有任何实数的平方是负的。\n\n它的要害正相反：**要证一个存在命题，给出一个见证**(witness)就够了；**要推翻它，则得说明无一可行**。\n\n## 量词的否定——德摩根律的「放大版」\n\n这是全节最要紧、日后用得最多的一处。先建立直觉：把 ∀x P(x) 想成「对论域里每个对象都成立」——论域有限时，它无非是一长串合取 P(a) ∧ P(b) ∧ ⋯；把 ∃x P(x) 想成「至少一个成立」，有限时就是一长串析取 P(a) ∨ P(b) ∨ ⋯。\n\n于是上一节的 <a class=\"wl\" data-id=\"fond_proposizioni\">德摩根律<\/a> 立刻「放大」成量词的否定规则：\n\n- ¬(∀x P(x)) ≡ ∃x ¬P(x)。「并非人人都 P」=「存在一个不 P 的」。（对应 ¬(p ∧ q) ≡ ¬p ∨ ¬q。）\n- ¬(∃x P(x)) ≡ ∀x ¬P(x)。「并不存在 P 的」=「人人都不 P」。（对应 ¬(p ∨ q) ≡ ¬p ∧ ¬q。）\n\n口诀就一句：**否定往里钻，∀ 与 ∃ 对调，谓词随之取反**。注意上面那个「一串 ∧ / 一串 ∨」只是帮你看清来路的类比——论域无限时 ∀、∃ 并不真是有限的合取析取；但这两条否定规则对**任意**论域（含无限）都照样成立，它们直接来自 ∀、∃ 的定义。\n\n举一例。「∀x ∈ ℝ, x² ≥ 0」的否定是「∃x ∈ ℝ, x² < 0」（把 ∀ 换成 ∃、把 x² ≥ 0 取反成 x² < 0）。原命题真，故其否定假——自洽。\n\n## 嵌套：顺序要人命\n\n把量词叠起来用时，**∀ 和 ∃ 的先后不能随便换**。看一个论域取 ℝ、谓词 Q(x, y) 为「y > x」的例子：\n\n- ∀x ∃y (y > x)：「对每个 x，都**找得到**一个更大的 y」。**真**——给定 x，取 y = x + 1 即可（y 可以随 x 变）。\n- ∃y ∀x (y > x)：「**存在某个** y，它比**每个** x 都大」。**假**——那等于说实数里有个最大的数，没有。\n\n同样的两个量词、同样的谓词，仅仅调了次序，真假就翻了。症结在于：∀x ∃y 里，y 的选取**允许依赖** x；而 ∃y ∀x 里，必须**一个 y 通吃所有** x。（顺带：同类量词之间可以随意交换——∀x∀y ≡ ∀y∀x，∃x∃y ≡ ∃y∃x；只有 ∀ 与 ∃ 混着叠时才挑顺序。）这个「顺序决定一切」的现象，等你将来学极限、连续的 ε-δ 定义时会反复撞见——那些定义正是几个 ∀、∃ 叠出来的，叠错顺序，意思就全变了。\n\n## 几个最容易栽跟头的地方\n\n- **否定时只做一半**。把 ∀ 的否定写成「∀x ¬P(x)」（只取反谓词、忘了换量词），或写成「∃x P(x)」（只换量词、忘了取反谓词），都是错的。两件事要一起做。\n- **混合量词的顺序**。如上例，调了次序就可能变味，务必照原句的先后来读。\n- **空论域的边界情形**。若论域为空，∀x P(x) **恒真**（举不出反例——这正是上一节「空洞为真」的体现），而 ∃x P(x) **恒假**（找不到对象作见证）。「所有住在这间空屋里的人都两米高」是一句真话。\n- **「=」暂且朴素地用**。下面练习里会出现「相等」，我们先按「指同一个对象」的朴素意思用它；它的严格身份留待讲关系时再交代。\n\n## 一道激活练习\n\n把下面这句的否定，**一步步把 ¬ 推到紧贴谓词为止**（最终式子里 ¬ 前面不许再有量词），写出最终形式，再用一句中文说清它断言什么、是真是假：\n\n¬( ∀x ∈ ℝ, ∃y ∈ ℝ, y > x )。\n\n（提示：从最外层的 ∀ 开始，一层层套用否定规则；每钻进一层，量词对调一次，最后对谓词「y > x」取反。）\n\n## 参考解答\n\n（建议先自己写完再看。）思路：从最外层量词起，每剥一层就套一次否定规则（∀↔∃ 对调、谓词取反），一路推到 ¬ 紧贴谓词。\n\n```\n¬( ∀x∈ℝ, ∃y∈ℝ, y>x )\n≡ ∃x∈ℝ, ¬( ∃y∈ℝ, y>x )     （¬∀ → ∃¬）\n≡ ∃x∈ℝ, ∀y∈ℝ, ¬(y>x)        （¬∃ → ∀¬）\n≡ ∃x∈ℝ, ∀y∈ℝ, y ≤ x          （「y>x」取反为「y≤x」）\n```\n\n它断言什么：**存在一个实数 x，比每个实数 y 都不小**——也就是「实数里有个最大的数」。**是假的**：对任何 x，x+1 就比它大，没有最大实数。（这与原句「对每个 x 都找得到更大的 y」为真恰好相反，自洽。）\n\n## 往前看一步\n\n现在，配上上一节的联结词，我们已经能把几乎任何一句数学断言写得滴水不漏。但有一样东西，这一节自始至终是**借来用**的：量词扫过的那个「论域」——我们一直说「x 取遍 ℝ」「取遍某个范围」，可这个**范围**本身，严格来说究竟是什么？它就是**集合**：把一些对象当成一个整体来看待，好让量词有个确切的地方去「取遍」。这正是 <a class=\"wl\" data-id=\"fond_insiemi\">集合<\/a> 要替我们钉死的第一件事。","refs":"Amann–Escher, Analysis I §I.1"},{"id":"fond_relazioni","label":"有序对与关系","parent":"fond_fondamenta","summary":"有序对 (a,b) 用纯集合造出「次序」，笛卡尔积 A×B 收集全部有序对；关系就是 A×B 的一个子集——「对应」从此是集合论里的一等公民。","depth":1,"isContainer":false,"isTop":false,"role":null,"color":"#A9A9A9","ring":3,"bearing":10,"popupLinks":[{"id":"fond_insiemi","text":"外延原则"},{"id":"fond_funzioni","text":"函数"}],"body":"\n## 为什么需要「次序」\n\n上一节刚立下的外延原则说：集合**不在乎次序**，{a, b} 和 {b, a} 是同一个东西。可数学里偏偏到处需要次序：平面上的点 (2, 3) 和 (3, 2) 是两个不同的点；「x 对应到 y」和「y 对应到 x」是两回事。我们的处境有点尴尬——手里唯一的原料是集合，而集合天生不认次序。这一节要干的第一件事，就是**用不认次序的材料，造出认次序的东西**；造出来之后，「元素之间的对应」立刻就能严格定义了。\n\n## 有序对\n\n我们想要一个对象 (a, b)，叫**有序对**(ordered pair)，它只需满足一条**特征性质**(characteristic property)：\n\n(a, b) = (c, d)  ⟺  a = c  ∧  b = d。\n\n也就是：两个有序对相等，当且仅当**对应位置**的成员各自相等。怎么用纯集合实现它？Kuratowski 给出的定义漂亮至极：\n\n(a, b) := { {a}, {a, b} }。\n\n直觉是：{a, b} 记录「成员是谁」，{a} 单独把**第一个**成员挑出来——次序信息就这样被「不对称地」编码进了一个普通集合。\n\n定义是否合格，全看特征性质是否真的成立。这是我们课程里第一个正经的**定理**(theorem)，把证明完整跑一遍——它恰好把前几节的工具全部用上。\n\n**定理（特征性质）.** 对任意对象 a, b, c, d：{{a},{a,b}} = {{c},{c,d}} ⟺ a=c ∧ b=d。\n\n**证明.** 「⟸」方向是顺的：若 a=c 且 b=d，把字母一替换，两边是同一个集合，自然相等。\n\n「⟹」方向才见真章。设 {{a},{a,b}} = {{c},{c,d}}，要推出 a=c 且 b=d。按 <a class=\"wl\" data-id=\"fond_insiemi\">外延原则<\/a>，左右两个集合成员完全相同。分两种情形。\n\n*情形一：a = b。* 这时 {a,b} = {a,a} = {a}（外延：成员相同），于是左边 = {{a},{a}} = {{a}}——只剩一个成员 {a}。右边与它相等，成员也只能全是 {a}，故 {c} = {a} 且 {c,d} = {a}。由 {c} = {a} 得 c = a（两个单元素集相等，成员必相同——还是外延）；由 {c,d} = {a} 得 d = a。于是 a = c，且 b = a = d。两条都到手。\n\n*情形二：a ≠ b。* 左边的成员 {a}（一个元素）和 {a,b}（两个不同元素）个数不同，是两个不同的集合。看右边的成员 {c} 必属于左边：{c} = {a} 或 {c} = {a,b}。后者不可能——单元素集装不下两个不同元素。故 {c} = {a}，得 **c = a**。再看左边的 {a,b} 必属于右边：{a,b} = {c} 或 {a,b} = {c,d}。前者同理不可能，故 {a,b} = {c,d}。其中 b 是右边的成员：b = c 或 b = d。若 b = c，则 b = a，违背本情形假设；故 **b = d**。∎\n\n> 这个证明值得回味一遍：通篇只用了外延原则与分情形讨论，没有任何新公理。还有一点要提前说破——你不必把 {{a},{a,b}} 的具体长相记在心上。**从今往后我们只使用特征性质**，把 Kuratowski 构造忘掉都行：它的使命只是证明「有序对这种东西用集合造得出来」。这种「造出来→验证性质→封装遗忘」的手法，以后构造 ℤ、ℚ、ℝ 时会一再上演。\n\n有了 (a,b)，**有序三元组**顺手就有：(a,b,c) := ((a,b),c)，以此类推。\n\n## 笛卡尔积\n\n把两个集合**所有可能的有序对**收集起来：A 与 B 的**笛卡尔积**(Cartesian product)是\n\nA × B := { (a, b) : a ∈ A, b ∈ B }。\n\n例：A = {1, 2, 3}，B = {1, 2}，则 A×B 共 3·2 = 6 个元素，可摆成一张格点阵——横向取 A、纵向取 B：\n\n<svg viewBox=\"0 0 300 190\" xmlns=\"http://www.w3.org/2000/svg\">\n  <line x1=\"50\" y1=\"150\" x2=\"270\" y2=\"150\" stroke=\"#888\" stroke-width=\"1.2\"/>\n  <line x1=\"50\" y1=\"150\" x2=\"50\" y2=\"30\" stroke=\"#888\" stroke-width=\"1.2\"/>\n  <text x=\"262\" y=\"168\" font-size=\"12\" fill=\"#555\">A<\/text>\n  <text x=\"34\" y=\"38\" font-size=\"12\" fill=\"#555\">B<\/text>\n  <text x=\"100\" y=\"168\" font-size=\"12\" text-anchor=\"middle\" fill=\"#333\">1<\/text>\n  <text x=\"160\" y=\"168\" font-size=\"12\" text-anchor=\"middle\" fill=\"#333\">2<\/text>\n  <text x=\"220\" y=\"168\" font-size=\"12\" text-anchor=\"middle\" fill=\"#333\">3<\/text>\n  <text x=\"38\" y=\"124\" font-size=\"12\" text-anchor=\"middle\" fill=\"#333\">1<\/text>\n  <text x=\"38\" y=\"74\" font-size=\"12\" text-anchor=\"middle\" fill=\"#333\">2<\/text>\n  <circle cx=\"100\" cy=\"120\" r=\"4\" fill=\"#E0612F\"/>\n  <circle cx=\"160\" cy=\"120\" r=\"4\" fill=\"#E0612F\"/>\n  <circle cx=\"220\" cy=\"120\" r=\"4\" fill=\"#E0612F\"/>\n  <circle cx=\"100\" cy=\"70\" r=\"4\" fill=\"#E0612F\"/>\n  <circle cx=\"160\" cy=\"70\" r=\"4\" fill=\"#E0612F\"/>\n  <circle cx=\"220\" cy=\"70\" r=\"4\" fill=\"#E0612F\"/>\n  <text x=\"236\" y=\"64\" font-size=\"11\" fill=\"#555\">(3,2)<\/text>\n<\/svg>\n\n这张格点图不是装饰——它就是日后**平面**的雏形：你熟悉的坐标平面，严格身份正是 ℝ × ℝ。「平面上的点 = 一个有序实数对」这句话，在这里第一次有了集合论的着落。\n\n注意 **A×B 与 B×A 一般不相等**：上例中 (3,2) ∈ A×B，但 (3,2) ∉ B×A（因为 3 ∉ B）。次序——我们辛苦造出来的东西——当然不白造。\n\n## 关系\n\n现在收割。直觉里，「A 的元素与 B 的元素之间的一种对应」无非是回答一个问题：**哪些 (a,b) 算对应上了？** 把\"算上了\"的那些有序对收进一个集合，对应本身就被这个集合完全刻画了。于是定义干脆得近乎失礼：\n\nA 到 B 的一个**关系**(relation)，就是笛卡尔积的一个子集 R ⊆ A × B。\n\n(a,b) ∈ R 时记 **a R b**，读「a 与 b 有关系 R」。A = B 时称 R 为 **A 上的**关系。\n\n这一手和上一节「∪∩∖ 就是 ∨∧¬」如出一辙：不发明新本体，把新概念**还原**成已有的集合操作。看几个老朋友的新身份：\n\n- **小于** < 是 ℝ 上的关系：它\"就是\"集合 {(x,y) ∈ ℝ×ℝ : x < y}。（ℝ 的严格构造还在后头，这里先拿它当例子用。）\n- **整除**是正整数上的关系：m R n ⟺ m 整除 n。如 3 R 12，但并非 3 R 7。\n- **包含** ⊆ 是「集合的集合」上的关系。\n- 极端例子也合法：R = ∅（谁也不对应谁）和 R = A×A（人人互相对应）都是 A 上的关系——子集嘛，空集和全集当然都算。\n\n## A 上关系的三种品性\n\n设 R 是 A 上的关系。三条最常被盘问的性质：\n\n- **自反**(reflexive)：∀x ∈ A, x R x。人人和自己有关系。\n- **对称**(symmetric)：∀x,y ∈ A ( x R y ⟹ y R x )。关系不分先后。\n- **传递**(transitive)：∀x,y,z ∈ A ( (x R y ∧ y R z) ⟹ x R z )。能接力。\n\n用例子和反例把三条钉牢（反例照例是命脉——它们说明三条性质互相独立、谁也不蕴含谁）：\n\n- ℝ 上的 ≤：自反（x≤x）、传递，但不对称（2≤3 而 3≰2）。\n- ℝ 上的 <：传递，但不自反（x<x 假）、不对称。\n- 「x 与 y 是同胞兄弟姐妹」：对称，但不自反，传递性也悬（x 与 x 不算）。\n- ℝ 上的相等 =：三条全占。\n\n三条全占的关系是个要紧的物种，叫**等价关系**——它能把一个集合干净地切成若干「互不往来的类」，是数学里**造新对象的头号机器**。它值得专门一节，这里先按下。\n\n## 一道激活练习\n
